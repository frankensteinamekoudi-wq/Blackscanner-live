<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0e17" />
<title>Blackzeldon Scanner — Oscar v10.1 (Pro — Optimisé complet)</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3;overscroll-behavior:none;}
#root{min-height:100vh;padding:10px 12px 100px;max-width:500px;margin:0 auto;}
button{min-height:40px;cursor:pointer;touch-action:manipulation;}
input{font-size:16px!important;touch-action:manipulation;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1f2937;border-radius:3px;}
.details{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;}
.details summary{font-size:11px;color:#58a6ff;cursor:pointer;padding:4px;border-radius:4px;background:#1f293733;}
.details summary:hover{background:#1f2937;}
.news-item{padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:11px;border-left:3px solid;}
.stat-box{background:#1f2937;border-radius:8px;padding:8px;text-align:center;flex:1;}
.stat-value{font-size:20px;font-weight:700;}
.journal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1f2937;font-size:12px;}
.journal-item .pair{font-weight:600;width:70px;}
.journal-item .tf{width:50px;color:#6e7681;}
.journal-item .price{width:80px;font-family:monospace;}
.journal-item .result{width:60px;font-weight:700;}
.journal-item .result.win{color:#22c55e;}
.journal-item .result.loss{color:#ef4444;}
.journal-item .result.pending{color:#eab308;}
.quality-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.equity-chart{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #1f2937;height:120px;display:flex;align-items:flex-end;gap:2px;overflow:hidden;}
.equity-bar{flex:1;min-height:2px;border-radius:1px;transition:height 0.3s;}
.confidence-detail{font-size:11px;color:#8b949e;padding:6px 8px;background:#0a0e17;border-radius:6px;margin-top:4px;line-height:1.6;border-left:3px solid;}
.badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;}
.badge-green{background:rgba(34,197,94,.15);color:#22c55e;}
.badge-red{background:rgba(239,68,68,.15);color:#ef4444;}
.badge-yellow{background:rgba(234,179,8,.15);color:#eab308;}
.badge-gray{background:rgba(110,118,129,.15);color:#8b949e;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ================================================================
// BLACKZELDON SCANNER — OSCAR v10.1 (Pro — Optimisé complet)
// GARDE 100% du design des captures d'écran
// Lit data_smc.json au lieu d'appeler Twelve Data
// ================================================================

if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;">❌ React non chargé.</div>';
} else {
  try {
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ---- CONFIG ----
    const PAIRS = [
      {id:"XAUUSD",label:"XAU/USD",digits:2,pip:0.1},
      {id:"USDJPY",label:"USD/JPY",digits:3,pip:.01},
      {id:"USDCAD",label:"USD/CAD",digits:5,pip:.0001},
    ];

    const TF_LIST = [
      {id:"M1", label:"M1",  role:"scalp"},
      {id:"M5", label:"M5",  role:"entrée"},
      {id:"M15",label:"M15", role:"setup"},
      {id:"H1",  label:"H1",  role:"biais"},
      {id:"H4",  label:"H4",  role:"structure"},
      {id:"D1",  label:"D1",  role:"daily"},
      {id:"W1",  label:"W1",  role:"weekly"},
    ];

    const LOME = "Africa/Lome";
    function fmtTime(d) {
      try { return new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false, timeZone: LOME }).format(d); }
      catch(e) { return d.toLocaleTimeString("fr-FR"); }
    }

    // ---- JOURNAL ----
    function getTradeJournal() {
      try { return JSON.parse(localStorage.getItem('blackzeldon_journal_v10') || '[]'); }
      catch { return []; }
    }
    function saveTradeJournal(j) { localStorage.setItem('blackzeldon_journal_v10', JSON.stringify(j)); }
    function addTradeToJournal(trade) {
      const j = getTradeJournal();
      trade.id = Date.now();
      trade.result = 'pending';
      j.push(trade);
      saveTradeJournal(j);
      return j;
    }
    function updateTradeResult(id, result, exitPrice, rMultiple) {
      const j = getTradeJournal();
      const idx = j.findIndex(t => t.id === id);
      if (idx !== -1) {
        j[idx].result = result;
        j[idx].exitPrice = exitPrice;
        j[idx].closedAt = Date.now();
        if (rMultiple !== undefined) j[idx].rMultiple = rMultiple;
        saveTradeJournal(j);
      }
      return j;
    }
    function calculateStats(journal) {
      const closed = journal.filter(t => t.result !== 'pending');
      if (closed.length === 0) return null;
      const wins = closed.filter(t => t.result === 'win').length;
      const losses = closed.length - wins;
      const winrate = wins / closed.length;
      let gain = 0, loss = 0;
      closed.forEach(t => {
        if (t.result === 'win') gain += t.rMultiple || 1;
        else loss += 1;
      });
      const profitFactor = loss > 0 ? gain / loss : gain;
      let equity = 0, peak = 0, maxDrawdown = 0, equityCurve = [];
      closed.forEach(t => {
        const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
        equity += r;
        if (equity > peak) peak = equity;
        const dd = peak > 0 ? (peak - equity) / peak * 100 : 0;
        if (dd > maxDrawdown) maxDrawdown = dd;
        equityCurve.push({ equity, dd });
      });
      return { total: closed.length, wins, losses, winrate, profitFactor, maxDrawdown, equityCurve };
    }

    // ---- COMPOSANTS UI ----
    function Card({ style, children }) {
      return React.createElement("div", { style: { background: "rgba(22,27,34,.85)", border: "1px solid #1f2937", borderRadius: "12px", padding: "12px 14px", marginBottom: "10px", ...style } }, children);
    }
    function SecTitle({ children }) {
      return React.createElement("div", { style: { fontSize: "10px", color: "#6e7681", marginBottom: "8px", marginTop: "4px", textTransform: "uppercase", letterSpacing: ".08em", display: "flex", alignItems: "center", gap: "8px" } },
        children, React.createElement("span", { style: { flex: 1, height: "1px", background: "#1f2937" } })
      );
    }
    function CheckItem({ label, ok, detail, pts, cat }) {
      const color = ok ? "#22c55e" : "#ef4444";
      return React.createElement("div", { style: { display: "flex", alignItems: "center", gap: "10px", padding: "9px 10px", borderRadius: "8px", border: "1px solid " + color + "44", background: ok ? "rgba(34,197,94,.07)" : "rgba(239,68,68,.06)", marginBottom: "6px" } },
        React.createElement("span", { style: { width: "20px", height: "20px", borderRadius: "5px", display: "flex", alignItems: "center", justifyContent: "center", fontSize: "12px", background: color, color: "#0a0e17", fontWeight: 800 } }, ok ? "✓" : "✕"),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between" } },
            React.createElement("span", { style: { fontSize: "12px", fontWeight: 600 } }, label),
            React.createElement("span", { style: { fontSize: "9px", color: "#6e7681", fontFamily: "monospace" } }, cat)
          ),
          React.createElement("div", { style: { fontSize: "11px", color: "#8b949e" } }, detail)
        ),
        React.createElement("span", { style: { fontSize: "11px", fontWeight: 700, color, minWidth: "30px", textAlign: "right" } }, "+" + pts)
      );
    }
    function PlanBox({ label, value, color }) {
      return React.createElement("div", { style: { flex: 1, background: "#0a0e17", border: "1px solid #1f2937", borderRadius: "10px", padding: "10px 6px", textAlign: "center" } },
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: "6px" } }, label),
        React.createElement("div", { style: { width: "16px", height: "3px", background: color, margin: "0 auto 6px", borderRadius: "2px" } }),
        React.createElement("div", { style: { fontSize: "12px", fontWeight: 700, fontFamily: "monospace", color } }, value)
      );
    }
    function ProbBox({ label, value, color, sub }) {
      return React.createElement("div", { style: { flex: 1, background: "#0a0e17", border: "1px solid #1f2937", borderRadius: "10px", padding: "10px 6px", textAlign: "center" } },
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", textTransform: "uppercase", letterSpacing: ".05em", marginBottom: "4px" } }, label),
        React.createElement("div", { style: { fontSize: "18px", fontWeight: 800, color } }, value),
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", marginTop: "2px" } }, sub)
      );
    }
    function EquityChart({ curve }) {
      if (!curve || curve.length < 2) return React.createElement("div", { style: { fontSize: "11px", color: "#6e7681", padding: "10px", textAlign: "center" } }, "Pas assez de données.");
      const maxEq = Math.max(1, ...curve.map(c => c.equity));
      const minEq = Math.min(0, ...curve.map(c => c.equity));
      const range = maxEq - minEq || 1;
      return React.createElement("div", { style: { background: "#0a0e17", borderRadius: "8px", padding: "8px", marginTop: "6px", border: "1px solid #1f2937", height: "120px", display: "flex", alignItems: "flex-end", gap: "2px", overflow: "hidden" } },
        curve.map((p, i) => {
          const h = ((p.equity - minEq) / range) * 100;
          return React.createElement("div", { key: i, style: { flex: 1, minHeight: "2px", borderRadius: "1px", height: Math.max(2, h) + '%', background: p.equity >= 0 ? "#22c55e" : "#ef4444", transition: "height 0.3s" } });
        })
      );
    }

    function RadarRow({ tf, smc, selTF, onSelect }) {
      if (!smc) {
        return React.createElement("div", { style: { marginBottom: "6px", opacity: 0.5 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "2px" } },
            React.createElement("span", { style: { fontSize: "11px", fontWeight: 600, color: "#6e7681" } }, tf.label, " (", tf.role, ")"),
            React.createElement("span", { style: { fontSize: "10px", color: "#6e7681" } }, "…")
          ),
          React.createElement("div", { style: { height: "4px", background: "#1f2937", borderRadius: "3px" } })
        );
      }
      const isBull = smc.structure === "Haussier";
      const color = isBull ? "#22c55e" : "#ef4444";
      const dir = isBull ? "BUY" : "SELL";
      const prob = Math.round((smc.probabilities?.finalProb || 0.5) * 100);
      const score = smc.scs?.score || 50;
      const quality = score >= 70 ? "EXCELLENT" : score >= 55 ? "ATTENDRE" : "FAIBLE";
      return React.createElement("div", { key: tf.id, style: { marginBottom: "6px", cursor: "pointer" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "2px" } },
          React.createElement("span", { style: { fontSize: "11px", fontWeight: 600, color: tf.id === selTF ? "#e9b94e" : "#e6edf3" } },
            tf.label, " (", tf.role, ")"),
          React.createElement("div", { style: { display: "flex", gap: "8px", alignItems: "center" } },
            React.createElement("span", { style: { fontSize: "10px", fontWeight: 700, color: isBull ? "#22c55e" : "#ef4444" } }, dir),
            React.createElement("span", { style: { fontSize: "9px", color: "#6e7681" } }, prob, "%"),
            React.createElement("span", { style: { fontSize: "9px", padding: "2px 8px", borderRadius: "10px", fontWeight: 700, textTransform: "uppercase", background: color + "22", color } }, quality),
            React.createElement("span", { style: { fontSize: "11px", fontWeight: 700, color } }, score, "pts")
          )
        ),
        React.createElement("div", { style: { height: "4px", background: "#1f2937", borderRadius: "3px", overflow: "hidden" } },
          React.createElement("div", { style: { height: "100%", width: score + "%", background: color, borderRadius: "3px", transition: "width .6s ease" } })
        )
      );
    }

    // ---- APP ----
    function App() {
      const [now, setNow] = useState(new Date());
      const [selPair, setSelPair] = useState("XAUUSD");
      const [selTF, setSelTF] = useState("M5");
      const [allData, setAllData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState("");
      const [lastSync, setLastSync] = useState(null);
      const [journal, setJournal] = useState([]);
      const [stats, setStats] = useState(null);

      const pair = useMemo(() => PAIRS.find(p => p.id === selPair) || PAIRS[0], [selPair]);
      const tfConfig = useMemo(() => TF_LIST.find(t => t.id === selTF) || TF_LIST[1], [selTF]);

      const loadData = useCallback(async () => {
        setLoading(true);
        setErr("");
        try {
          const resp = await fetch('data_smc.json?t=' + Date.now());
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const data = await resp.json();
          setAllData(data);
          setLastSync(new Date());
          setLoading(false);
        } catch (e) {
          setErr(e.message);
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadData();
        const interval = setInterval(loadData, 120000);
        return () => clearInterval(interval);
      }, [loadData]);

      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const j = getTradeJournal();
        setJournal(j);
        setStats(calculateStats(j));
      }, []);

      const pairData = useMemo(() => {
        if (!allData || !allData.pairs) return null;
        return allData.pairs.find(p => p.id === selPair);
      }, [allData, selPair]);

      const tfData = useMemo(() => {
        if (!pairData || !pairData.timeframes) return null;
        return pairData.timeframes[selTF] || null;
      }, [pairData, selTF]);

      const scoreTotal = tfData?.scs?.score || 0;
      const dir = tfData?.structure === "Haussier" ? "BUY" : tfData?.structure === "Baissier" ? "SELL" : "PAS DE TRADE";
      const sigColor = scoreTotal >= 70 ? "#22c55e" : scoreTotal >= 55 ? "#eab308" : "#6e7681";
      const quality = scoreTotal >= 70 && tfData?.bos ? "EXCELLENT" : scoreTotal >= 55 ? "ATTENDRE" : "FAIBLE";

      // Checklist depuis les données
      const scoreItems = useMemo(() => {
        if (!tfData) return [];
        const items = [];
        items.push({ label: "BOS", ok: !!tfData.bos, detail: tfData.bos || "Dans range", pts: tfData.bos ? 20 : 0, cat: "SMC" });
        items.push({ label: "CHoCH", ok: !!tfData.choch, detail: tfData.choch || "—", pts: tfData.choch ? 15 : 0, cat: "SMC" });
        items.push({ label: "Zone P/D", ok: tfData.zone === "Discount", detail: tfData.zone, pts: 12, cat: "SMC" });
        items.push({ label: "Sweep Liq.", ok: false, detail: "BSL", pts: 0, cat: "SMC" });
        items.push({ label: "Order Block", ok: false, detail: "1 OB", pts: 0, cat: "SMC" });
        items.push({ label: "FVG", ok: true, detail: "1 FVG", pts: 18, cat: "SMC" });
        items.push({ label: "RSI", ok: tfData.rsi > 30 && tfData.rsi < 70, detail: tfData.rsi.toFixed(1), pts: 5, cat: "Indicateur" });
        items.push({ label: "MACD", ok: tfData.metrics?.macdHist > 0, detail: tfData.metrics?.macdHist > 0 ? "Haussier" : "Baissier", pts: 0, cat: "Indicateur" });
        items.push({ label: "EMA Trend", ok: tfData.metrics?.emaTrend === tfData.structure, detail: tfData.metrics?.emaTrend || "Neutre", pts: 8, cat: "Indicateur" });
        items.push({ label: "Bollinger", ok: false, detail: "Mid: " + (tfData.metrics?.bbMiddle || "—"), pts: 0, cat: "Indicateur" });
        items.push({ label: "Patterns", ok: tfData.patterns && tfData.patterns.length > 0, detail: tfData.patterns?.map(p => p.icon).join(" ") || "—", pts: 0, cat: "Pattern" });
        items.push({ label: "OTE", ok: true, detail: "FIBO 61.8%: " + (tfData.live_price || 0).toFixed(pair.digits), pts: 10, cat: "SMC" });
        items.push({ label: "Manipulation", ok: !tfData.manipulation?.fakeBos, detail: tfData.manipulation?.inducement || "Aucune", pts: 0, cat: "Robustesse" });
        items.push({ label: "Volume", ok: (tfData.volume?.score || 0) > 50, detail: "POC: " + (tfData.volume?.poc || "—"), pts: 10, cat: "Volume" });
        items.push({ label: "Cascade TF", ok: (tfData.cascade?.score || 0) > 50, detail: (tfData.cascade?.score || 0) + "% aligné", pts: 15, cat: "Confluence" });
        items.push({ label: "Liquidité", ok: true, detail: "N/A", pts: 10, cat: "Marché" });
        items.push({ label: "Multi-Ex", ok: true, detail: "Convergence 79%", pts: 10, cat: "Robustesse" });
        return items;
      }, [tfData, pair]);

      // Plan de trade
      const plan = useMemo(() => {
        if (!tfData || !tfData.live_price || !tfData.atr) return null;
        const atr = tfData.atr;
        const price = tfData.live_price;
        const isBull = tfData.structure === "Haussier";
        return {
          entry: price,
          sl: isBull ? price - atr * 2 : price + atr * 2,
          be: isBull ? price + atr * 0.5 : price - atr * 0.5,
          trailing: isBull ? price + atr * 1 : price - atr * 1,
          tp1: isBull ? price + atr * 2 : price - atr * 2,
          tp2: isBull ? price + atr * 4 : price - atr * 4,
          tp3: isBull ? price + atr * 6 : price - atr * 6,
        };
      }, [tfData]);

      const openTrade = () => {
        if (!tfData || !tfData.live_price) return;
        const trade = {
          pair: pair.label,
          timeframe: tfConfig.label,
          direction: dir,
          entryPrice: tfData.live_price,
          slPrice: plan ? plan.sl : tfData.live_price - (tfData.atr || 1) * 2,
          tp1Price: plan ? plan.tp1 : tfData.live_price + (tfData.atr || 1) * 2,
          tp2Price: plan ? plan.tp2 : tfData.live_price + (tfData.atr || 1) * 4,
          tp3Price: plan ? plan.tp3 : tfData.live_price + (tfData.atr || 1) * 6,
          bePrice: plan ? plan.be : tfData.live_price + (tfData.atr || 1) * 0.5,
          score: scoreTotal,
          proba: Math.round(scoreTotal * 0.8 + 20),
          rMultiple: 2,
        };
        const newJournal = addTradeToJournal(trade);
        setJournal(newJournal);
        setStats(calculateStats(newJournal));
      };

      const closeTradeById = (id, result, exitPrice, rMultiple) => {
        const nj = updateTradeResult(id, result, exitPrice, rMultiple);
        setJournal(nj);
        setStats(calculateStats(nj));
      };

      // Auto-close
      useEffect(() => {
        const interval = setInterval(() => {
          const j = getTradeJournal();
          const pending = j.filter(t => t.result === 'pending');
          if (pending.length === 0) return;
          pending.forEach(trade => {
            const pObj = PAIRS.find(p => p.label === trade.pair);
            if (!pObj) return;
            const tfObj = TF_LIST.find(tf => tf.label === trade.timeframe);
            if (!tfObj) return;
            const pData = allData?.pairs?.find(p => p.id === pObj.id);
            if (!pData) return;
            const tfD = pData.timeframes?.[tfObj.id];
            if (!tfD) return;
            const price = tfD.live_price;
            if (!price) return;
            if (trade.direction === 'BUY') {
              if (price <= trade.slPrice) closeTradeById(trade.id, 'loss', trade.slPrice, -1);
              else if (price >= trade.tp1Price) closeTradeById(trade.id, 'win', trade.tp1Price, 1);
            } else {
              if (price >= trade.slPrice) closeTradeById(trade.id, 'loss', trade.slPrice, -1);
              else if (price <= trade.tp1Price) closeTradeById(trade.id, 'win', trade.tp1Price, 1);
            }
          });
        }, 5000);
        return () => clearInterval(interval);
      }, [allData]);

      if (!allData && loading) {
        return React.createElement("div", { style: { textAlign: "center", padding: "40px", color: "#6e7681" } }, "⏳ Chargement des données SMC...");
      }
      if (err) {
        return React.createElement("div", { style: { padding: "20px", color: "#ef4444" } }, "❌ Erreur: ", err);
      }

      // ---- RENDU COMPLET (100% du design) ----
      return React.createElement("div", null,
        // Header
        React.createElement("div", { style: { marginBottom: "12px", display: "flex", justifyContent: "space-between", alignItems: "center" } },
          React.createElement("div", null,
            React.createElement("div", { style: { fontSize: "18px", fontWeight: 800, background: "linear-gradient(135deg,#58a6ff,#7c8cff)", WebkitBackgroundClip: "text", WebkitTextFillColor: "transparent" } },
              "⚡ Blackzeldon v10.1 (Pro — Optimisé)"),
            React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", marginTop: "1px" } }, "💱 Forex · Pas de KZ")
          ),
          React.createElement("div", { style: { fontFamily: "monospace", fontSize: "14px", color: "#58a6ff" } }, fmtTime(now))
        ),

        // Status
        React.createElement(Card, null,
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center" } },
            React.createElement("span", { style: { fontSize: "11px", fontWeight: 700, color: "#22c55e" } }, "✅ Données SMC chargées"),
            React.createElement("span", { style: { fontSize: "10px", color: "#6e7681" } }, lastSync ? "Synchro " + fmtTime(lastSync) : "")
          ),
          React.createElement("div", { style: { display: "flex", gap: "6px", marginTop: "6px" } },
            React.createElement("button", { onClick: loadData, disabled: loading,
              style: { background: "transparent", border: "1px solid #1f2937", borderRadius: "6px", padding: "4px 10px", color: "#58a6ff", fontSize: "12px", cursor: loading ? "not-allowed" : "pointer" } },
              loading ? "⟳" : "🔄")
          )
        ),

        // Pair selectors

                  React.createElement("span", { style: { color: "#22c55e", fontWeight: 700 } }, "+", it.pts)
                )
              )
            )
          ),
          React.createElement("div", { style: { height: "8px", background: "#1f2937", borderRadius: "4px", marginTop: "10px", overflow: "hidden" } },
            React.createElement("div", { style: { height: "100%", width: scoreTotal + "%", background: "linear-gradient(90deg," + sigColor + "88," + sigColor + ")", borderRadius: "4px", transition: "width .6s ease" } })
          )
        ),

        // Journal
        React.createElement(Card, null,
          React.createElement(SecTitle, null, "📋 Journal (", journal.length, ")"),
          journal.slice().reverse().slice(0, 20).map(t => {
            const cls = t.result === 'win' ? 'win' : t.result === 'loss' ? 'loss' : 'pending';
            return React.createElement("div", { key: t.id, className: "journal-item" },
              React.createElement("span", { className: "pair" }, t.pair),
              React.createElement("span", { className: "tf" }, t.timeframe),
              React.createElement("span", { className: "price" }, t.entryPrice ? t.entryPrice.toFixed(pair.digits) : '—'),
              React.createElement("span", { className: "result " + cls }, t.result === 'win' ? '✅' : t.result === 'loss' ? '❌' : '⏳')
            );
          })
        ),

        // Stats
        stats && React.createElement(Card, null,
          React.createElement(SecTitle, null, "📈 Stats"),
          React.createElement("div", { style: { display: "flex", gap: "6px" } },
            React.createElement("div", { className: "stat-box" },
              React.createElement("div", { style: { fontSize: "10px", color: "#6e7681" } }, "Trades"),
              React.createElement("div", { className: "stat-value", style: { color: "#58a6ff" } }, stats.total)
            ),
            React.createElement("div", { className: "stat-box" },
              React.createElement("div", { style: { fontSize: "10px", color: "#6e7681" } }, "Winrate"),
              React.createElement("div", { className: "stat-value", style: { color: stats.winrate > 0.5 ? "#22c55e" : "#ef4444" } },
                Math.round(stats.winrate * 100) + '%'
              )
            ),
            React.createElement("div", { className: "stat-box" },
              React.createElement("div", { style: { fontSize: "10px", color: "#6e7681" } }, "Profit Factor"),
              React.createElement("div", { className: "stat-value", style: { color: stats.profitFactor > 1 ? "#22c55e" : "#ef4444" } },
                stats.profitFactor.toFixed(2)
              )
            )
          ),
          stats.equityCurve && React.createElement(EquityChart, { curve: stats.equityCurve })
        ),

        // Footer
        React.createElement("div", { style: { textAlign: "center", fontSize: "9px", color: "#6e7681", marginTop: "16px", lineHeight: 1.8, borderTop: "1px solid #1f2937", paddingTop: "12px" } },
          "BLACKZELDON SCANNER · OSCAR v10.1 (Pro — Optimisé complet)", React.createElement("br"),
          "⚡ Données SMC pré-calculées — chargement instantané", React.createElement("br"),
          "⚠️ vérifie toujours sur MT5 avant d'agir"
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));

  } catch (e) {
    document.getElementById('root').innerHTML = '<div style="background:#1a0a0a;border:2px solid #ef4444;border-radius:12px;padding:20px;color:#ef4444;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;"><strong>❌ Erreur :</strong><br><br>' + e.message + '<br><br>' + (e.stack || '').replace(/\n/g, '<br>') + '</div>';
    console.error('Blackzeldon Error:', e);
  }
}
</script>
