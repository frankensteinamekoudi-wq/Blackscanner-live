<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e17" />
    <title>Blackzeldon Scanner</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e17; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e6edf3; padding: 10px 12px 80px; max-width: 500px; margin: 0 auto; }
        .card { background: rgba(22,27,34,.85); border: 1px solid #1f2937; border-radius: 12px; padding: 12px 14px; margin-bottom: 10px; }
        .card h3 { font-size: 10px; color: #6e7681; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px; display: flex; align-items: center; gap: 8px; }
        .card h3 span { flex: 1; height: 1px; background: #1f2937; }
        .flex { display: flex; gap: 8px; flex-wrap: wrap; }
        .stat { background: #0a0e17; border-radius: 8px; padding: 8px; text-align: center; flex: 1; min-width: 50px; }
        .stat .label { font-size: 9px; color: #6e7681; }
        .stat .value { font-size: 18px; font-weight: 700; }
        .badge { font-size: 9px; padding: 2px 8px; border-radius: 10px; font-weight: 700; }
        .tag-green { background: rgba(34,197,94,.15); color: #22c55e; }
        .tag-red { background: rgba(239,68,68,.15); color: #ef4444; }
        .tag-yellow { background: rgba(234,179,8,.15); color: #eab308; }
        .tag-gray { background: rgba(110,118,129,.15); color: #8b949e; }
        .btn { background: #58a6ff; color: #0a0e17; border: none; border-radius: 6px; padding: 8px 14px; font-weight: 700; font-size: 12px; cursor: pointer; }
        .btn:disabled { opacity: 0.5; }
        select { background: #0a0e17; border: 1px solid #1f2937; border-radius: 6px; padding: 6px 10px; color: #e6edf3; font-size: 13px; width: 100%; }
        .zone-item { border-left: 3px solid; padding: 6px 10px; margin-bottom: 4px; background: rgba(255,255,255,.03); border-radius: 4px; display: flex; justify-content: space-between; font-size: 12px; }
        .journal-item { display: flex; justify-content: space-between; padding: 4px 0; font-size: 11px; border-bottom: 1px solid #1f2937; }
        .journal-item .win { color: #22c55e; }
        .journal-item .loss { color: #ef4444; }
        .journal-item .pending { color: #eab308; }
        .loading { text-align: center; padding: 30px; color: #6e7681; }
        .error { color: #ef4444; padding: 12px; background: rgba(239,68,68,.1); border-radius: 8px; }
        .row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 12px; border-bottom: 1px solid #1f2937; }
    </style>
</head>
<body>
<div id="root"><div class="loading">⏳ Chargement...</div></div>

<script>
// ============================================================
// BLACKZELDON SCANNER — VERSION LÉGÈRE
// ============================================================

const PAIRS = [
    { id: "XAUUSD", label: "XAU/USD", digits: 2 },
    { id: "USDJPY", label: "USD/JPY", digits: 3 },
    { id: "USDCAD", label: "USD/CAD", digits: 5 },
];

const TF_LIST = ["M1", "M5", "M15", "H1", "H4", "D1", "W1"];

let selectedPair = "XAUUSD";
let selectedTF = "M5";
let data = null;
let journal = [];
let stats = null;

// --- Journal ---
function getJournal() {
    try { return JSON.parse(localStorage.getItem('bz_journal') || '[]'); }
    catch { return []; }
}
function saveJournal(j) {
    try { localStorage.setItem('bz_journal', JSON.stringify(j)); }
    catch {}
}
function addTrade(trade) {
    const j = getJournal();
    trade.id = Date.now();
    trade.result = 'pending';
    j.push(trade);
    saveJournal(j);
    journal = j;
    updateStats();
    render();
}
function updateTrade(id, result, exitPrice) {
    const j = getJournal();
    const idx = j.findIndex(t => t.id === id);
    if (idx !== -1) {
        j[idx].result = result;
        j[idx].exitPrice = exitPrice;
        j[idx].closedAt = Date.now();
        saveJournal(j);
        journal = j;
        updateStats();
        render();
    }
}
function updateStats() {
    const closed = journal.filter(t => t.result !== 'pending');
    if (closed.length === 0) { stats = null; return; }
    const wins = closed.filter(t => t.result === 'win').length;
    const losses = closed.length - wins;
    const winrate = closed.length > 0 ? wins / closed.length : 0;
    let gain = 0, loss = 0;
    closed.forEach(t => {
        if (t.result === 'win') gain += t.rMultiple || 1;
        else loss += 1;
    });
    stats = { total: closed.length, wins, losses, winrate, profitFactor: loss > 0 ? gain / loss : gain };
}
journal = getJournal();
updateStats();

// --- Chargement ---
async function loadData() {
    const root = document.getElementById('root');
    root.innerHTML = '<div class="loading">⏳ Chargement...</div>';

    try {
        const url = 'https://raw.githubusercontent.com/frankensteinamekoudi-wq/Blackscanner-live/main/data_smc.json?t=' + Date.now();
        const resp = await fetch(url);
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        data = await resp.json();
        render();
    } catch (e) {
        root.innerHTML = `<div class="error">❌ ${e.message}<br><br><button class="btn" onclick="loadData()">🔄 Réessayer</button></div>`;
    }
}

// --- Rendu ---
function render() {
    if (!data) return;
    const root = document.getElementById('root');
    const pairData = data.pairs.find(p => p.id === selectedPair);
    const tfData = pairData ? pairData.timeframes[selectedTF] : null;

    let html = '';

    // Header
    html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
        <div><div style="font-size:18px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#7c8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">⚡ Blackzeldon</div>
        <div style="font-size:9px;color:#6e7681;">${data.updated_at || ''}</div></div>
        <div style="font-size:12px;color:#6e7681;">${new Date().toLocaleTimeString('fr-FR')}</div>
    </div>`;

    // Sélecteurs
    html += `<div class="card"><div class="flex">
        <select id="pairSelect" onchange="selectedPair=this.value;render();">
            ${PAIRS.map(p => `<option value="${p.id}" ${p.id===selectedPair?'selected':''}>${p.label}</option>`).join('')}
        </select>
        <select id="tfSelect" onchange="selectedTF=this.value;render();">
            ${TF_LIST.map(t => `<option value="${t}" ${t===selectedTF?'selected':''}>${t}</option>`).join('')}
        </select>
    </div></div>`;

    if (!tfData) {
        html += `<div class="card"><div style="text-align:center;color:#6e7681;padding:20px;">Aucune donnée pour ${selectedPair} ${selectedTF}</div></div>`;
        root.innerHTML = html;
        return;
    }

    const smc = tfData;
    const isBull = smc.structure === 'Haussier';
    const color = isBull ? '#22c55e' : '#ef4444';

    // Signal
    html += `<div class="card" style="border:1px solid ${color}55;">
        <div style="display:flex;justify-content:space-between;align-items:center;">
            <div>
                <div style="font-size:28px;font-weight:700;">${smc.live_price}</div>
                <div style="font-size:11px;color:#8b949e;">${smc.structure} · ${smc.zone}</div>
            </div>
            <div style="text-align:right;">
                <div style="padding:5px 14px;border-radius:20px;font-size:13px;font-weight:700;background:${color}22;color:${color};">${isBull ? '▲ HAUSSIER' : '▼ BAISSIER'}</div>
                <div style="font-size:10px;color:#8b949e;margin-top:4px;">BOS: ${smc.bos || '—'} · CHoCH: ${smc.choch || '—'}</div>
            </div>
        </div>
        <div class="flex" style="margin-top:8px;">
            ${smc.daily_bias !== 'Neutre' ? `<span class="badge ${smc.daily_bias === 'Haussier' ? 'tag-green' : 'tag-red'}">D1: ${smc.daily_bias}</span>` : ''}
            ${smc.weekly_bias !== 'Neutre' ? `<span class="badge ${smc.weekly_bias === 'Haussier' ? 'tag-green' : 'tag-red'}">W1: ${smc.weekly_bias}</span>` : ''}
            <span class="badge tag-gray">RSI ${smc.rsi}</span>
            <span class="badge tag-gray">ATR ${smc.atr}</span>
        </div>
    </div>`;

    // Métriques
    html += `<div class="card">
        <h3>📊 Métriques <span></span></h3>
        <div class="flex">
            <div class="stat"><div class="label">Range</div><div class="value" style="color:#58a6ff;">${smc.range_size}</div></div>
            <div class="stat"><div class="label">Trend</div><div class="value" style="font-size:14px;color:${smc.ema_trend === 'Haussier' ? '#22c55e' : '#ef4444'};">${smc.ema_trend}</div></div>
            <div class="stat"><div class="label">Major</div><div class="value" style="font-size:14px;color:${smc.major_trend === 'Haussier' ? '#22c55e' : '#ef4444'};">${smc.major_trend}</div></div>
        </div>
    </div>`;

    // Journal
    const pending = journal.filter(t => t.pair === selectedPair && t.tf === selectedTF && t.result === 'pending');
    html += `<div class="card">
        <h3>📋 Journal (${journal.filter(t => t.result !== 'pending').length} clos) <span></span></h3>
        ${pending.map(t => `
            <div class="journal-item">
                <span>⏳ ${t.pair} ${t.tf} ${t.dir}</span>
                <span>
                    <button class="btn" style="font-size:9px;padding:2px 6px;background:#22c55e;" onclick="updateTrade(${t.id},'win',${t.entryPrice*1.02})">Win</button>
                    <button class="btn" style="font-size:9px;padding:2px 6px;background:#ef4444;" onclick="updateTrade(${t.id},'loss',${t.entryPrice*0.98})">Loss</button>
                </span>
            </div>
        `).join('')}
        ${journal.filter(t => t.result !== 'pending').slice(-5).reverse().map(t => `
            <div class="journal-item">
                <span class="${t.result}">${t.result === 'win' ? '✅' : '❌'} ${t.pair} ${t.tf}</span>
                <span style="color:#8b949e;">${t.result === 'win' ? '+' : '-'}${t.rMultiple || 1}R</span>
            </div>
        `).join('')}
    </div>`;

    // Stats
    if (stats) {
        html += `<div class="card">
            <h3>📈 Stats <span></span></h3>
            <div class="flex">
                <div class="stat"><div class="label">Trades</div><div class="value">${stats.total}</div></div>
                <div class="stat"><div class="label">Winrate</div><div class="value" style="color:${stats.winrate > 0.5 ? '#22c55e' : '#ef4444'};">${Math.round(stats.winrate*100)}%</div></div>
                <div class="stat"><div class="label">PF</div><div class="value" style="color:${stats.profitFactor > 1 ? '#22c55e' : '#ef4444'};">${stats.profitFactor.toFixed(2)}</div></div>
            </div>
        </div>`;
    }

    // Bouton trade
    if (smc.bos || smc.choch) {
        html += `<button class="btn" style="width:100%;background:${color};" onclick="addTrade({pair:'${selectedPair}',tf:'${selectedTF}',dir:'${smc.structure}',entryPrice:${smc.live_price},rMultiple:2})">
            📈 Ouvrir ${smc.structure}
        </button>`;
    }

    // Refresh
    html += `<div style="text-align:center;margin-top:12px;font-size:9px;color:#6e7681;">
        <button class="btn" style="background:transparent;color:#6e7681;border:1px solid #1f2937;padding:4px 12px;" onclick="loadData()">🔄 Rafraîchir</button>
    </div>`;

    root.innerHTML = html;
}

// --- Démarrage ---
loadData();
setInterval(loadData, 120000);
</script>
</body>
</html>
