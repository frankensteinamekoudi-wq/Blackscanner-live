<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta name="theme-color" content="#0a0e17" />
<title>Blackzeldon Scanner — Oscar v10.1 (Pro — Optimisé complet)</title>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18.2.0/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18.2.0/umd/react-dom.production.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3;overscroll-behavior:none;}
#root{min-height:100vh;padding:10px 12px 100px;max-width:500px;margin:0 auto;}
button{min-height:40px;cursor:pointer;touch-action:manipulation;}
input{font-size:16px!important;touch-action:manipulation;}
::-webkit-scrollbar{width:3px;}
::-webkit-scrollbar-thumb{background:#1f2937;border-radius:3px;}
.details{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;}
.details summary{font-size:11px;color:#58a6ff;cursor:pointer;padding:4px;border-radius:4px;background:#1f293733;}
.details summary:hover{background:#1f2937;}
.news-item{padding:6px 10px;border-radius:6px;margin-bottom:4px;font-size:11px;border-left:3px solid;}
.stat-box{background:#1f2937;border-radius:8px;padding:8px;text-align:center;flex:1;}
.stat-value{font-size:20px;font-weight:700;}
.journal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1f2937;font-size:12px;}
.journal-item .pair{font-weight:600;width:70px;}
.journal-item .tf{width:50px;color:#6e7681;}
.journal-item .price{width:80px;font-family:monospace;}
.journal-item .result{width:60px;font-weight:700;}
.journal-item .result.win{color:#22c55e;}
.journal-item .result.loss{color:#ef4444;}
.journal-item .result.pending{color:#eab308;}
.request-status{background:#1f2937;border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:11px;display:flex;flex-wrap:wrap;gap:4px;}
.request-status .item{background:#0a0e17;border-radius:4px;padding:3px 8px;border-left:3px solid;display:flex;align-items:center;gap:6px;}
.request-status .item .label{color:#8b949e;}
.request-status .item .status{font-weight:600;}
.request-status .item .status.pending{color:#eab308;}
.request-status .item .status.running{color:#58a6ff;}
.request-status .item .status.done{color:#22c55e;}
.request-status .item .status.error{color:#ef4444;}
.request-status .item .timer{color:#6e7681;font-family:monospace;}
.quality-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.equity-chart{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #1f2937;height:120px;display:flex;align-items:flex-end;gap:2px;overflow:hidden;}
.equity-bar{flex:1;min-height:2px;border-radius:1px;transition:height 0.3s;}
.confidence-detail{font-size:11px;color:#8b949e;padding:6px 8px;background:#0a0e17;border-radius:6px;margin-top:4px;line-height:1.6;border-left:3px solid;}
.market-closed-banner{background:rgba(239,68,68,.1);border:1px solid #ef444455;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#ef4444;display:flex;align-items:center;gap:8px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
// ================================================================
// BLACKZELDON SCANNER — OSCAR v10.1 (Pro — Optimisé complet)
// GARDE 100% du design et des fonctionnalités
// Lit data_smc.json au lieu d'appeler Twelve Data
// ================================================================

if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;">❌ React non chargé.</div>';
} else {
  try {
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ---- CONFIG ----
    const PAIRS = [
      {id:"XAUUSD",label:"XAU/USD",symbol:"XAU/USD",digits:2,pip:0.1,type:"fx"},
      {id:"USDJPY",label:"USD/JPY",symbol:"USD/JPY",digits:3,pip:.01,type:"fx"},
      {id:"USDCAD",label:"USD/CAD",symbol:"USD/CAD",digits:5,pip:.0001,type:"fx"},
    ];

    const TF_LIST = [
      {id:"M1", label:"M1",  role:"scalp"},
      {id:"M5", label:"M5",  role:"entrée"},
      {id:"M15",label:"M15", role:"setup"},
      {id:"H1",  label:"H1",  role:"biais"},
      {id:"H4",  label:"H4",  role:"structure"},
      {id:"D1",  label:"D1",  role:"daily"},
      {id:"W1",  label:"W1",  role:"weekly"},
    ];

    const KZ = [
      {id:"london",label:"London",  start:480, end:600},
      {id:"ny",    label:"New York",start:780, end:900},
      {id:"asia",  label:"Asie",    start:0,   end:180},
    ];

    const LOME = "Africa/Lome";

    // ---- FONCTIONS UTILES ----
    function fmtTime(d) {
      try { return new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false, timeZone: LOME }).format(d); }
      catch(e) { return d.toLocaleTimeString("fr-FR"); }
    }
    function fmtHM(d) {
      try { return new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: LOME }).format(d); }
      catch(e) { return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }
    }
    function lomeMin(d) {
      try {
        const p = new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: LOME }).formatToParts(d);
        return parseInt(p.find(x => x.type === "hour").value) * 60 + parseInt(p.find(x => x.type === "minute").value);
      } catch(e) { return d.getHours() * 60 + d.getMinutes(); }
    }
    function activeKZ(m) {
      return KZ.find(k => m >= k.start && m < k.end) || null;
    }

    // ---- JOURNAL ----
    function getTradeJournal() {
      try { const d = localStorage.getItem('blackzeldon_journal_v10'); return d ? JSON.parse(d) : []; }
      catch(e) { return []; }
    }
    function saveTradeJournal(j) { try { localStorage.setItem('blackzeldon_journal_v10', JSON.stringify(j)); } catch(e) {} }
    function addTradeToJournal(trade) {
      const j = getTradeJournal();
      const entry = { id: Date.now(), ...trade, timestamp: Date.now(), result: 'pending' };
      j.push(entry);
      saveTradeJournal(j);
      return j;
    }
    function updateTradeResult(id, result, exitPrice, rMultiple) {
      const j = getTradeJournal();
      const idx = j.findIndex(t => t.id === id);
      if (idx !== -1) {
        j[idx].result = result;
        j[idx].exitPrice = exitPrice;
        j[idx].closedAt = Date.now();
        if (rMultiple !== undefined) j[idx].rMultiple = rMultiple;
        saveTradeJournal(j);
      }
      return j;
    }
    function calculateStats(journal) {
      const closed = journal.filter(t => t.result !== 'pending' && t.result !== undefined);
      const total = closed.length;
      if (total === 0) return null;
      const wins = closed.filter(t => t.result === 'win').length;
      const losses = closed.filter(t => t.result === 'loss').length;
      const winrate = total > 0 ? wins / total : 0;
      let totalGain = 0, totalLoss = 0, gains = [], lossesArr = [];
      closed.forEach(t => {
        const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
        if (t.result === 'win') { totalGain += r; gains.push(r); }
        else { totalLoss += 1; lossesArr.push(1); }
      });
      const profitFactor = totalLoss > 0 ? totalGain / totalLoss : 0;
      const avgGain = gains.length > 0 ? gains.reduce((a,b) => a+b, 0) / gains.length : 0;
      const avgLoss = lossesArr.length > 0 ? lossesArr.reduce((a,b) => a+b, 0) / lossesArr.length : 0;
      let equity = 0, peak = 0, maxDrawdown = 0, maxDrawdownR = 0, equityCurve = [];
      let currentStreak = 0, streakType = null, maxWinStreak = 0, maxLossStreak = 0;
      closed.forEach(t => {
        const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
        if (t.result === 'win') { equity += r; if (streakType === 'win') currentStreak++; else { currentStreak = 1; streakType = 'win'; } maxWinStreak = Math.max(maxWinStreak, currentStreak); }
        else { equity -= 1; if (streakType === 'loss') currentStreak++; else { currentStreak = 1; streakType = 'loss'; } maxLossStreak = Math.max(maxLossStreak, currentStreak); }
        if (equity > peak) peak = equity;
        const ddR = peak - equity; if (ddR > maxDrawdownR) maxDrawdownR = ddR;
        const dd = peak > 0 ? (peak - equity) / peak * 100 : 0; if (dd > maxDrawdown) maxDrawdown = dd;
        equityCurve.push({ index: equityCurve.length, equity, dd });
      });
      return { total, wins, losses, winrate, profitFactor, avgGain, avgLoss, maxDrawdown, maxDrawdownR, maxWinStreak, maxLossStreak, equityCurve };
    }

    // ---- COMPOSANTS UI ----
    function SecTitle(props) {
      return React.createElement("div", {
        style: { fontSize: "10px", color: "#6e7681", marginBottom: "8px", marginTop: "4px", textTransform: "uppercase",
          letterSpacing: ".08em", display: "flex", alignItems: "center", gap: "8px" }
      }, props.children, React.createElement("span", { style: { flex: 1, height: "1px", background: "#1f2937" } }));
    }
    function Card(props) {
      const baseStyle = { background: "rgba(22,27,34,.85)", border: "1px solid #1f2937", borderRadius: "12px", padding: "12px 14px", marginBottom: "10px" };
      const merged = Object.assign({}, baseStyle, props.style || {});
      return React.createElement("div", { style: merged }, props.children);
    }
    function CheckItem(props) {
      const { label, ok, detail, pts, cat } = props;
      const color = ok ? "#22c55e" : "#ef4444";
      const bg = ok ? "rgba(34,197,94,.07)" : "rgba(239,68,68,.06)";
      return React.createElement("div", {
        style: { display: "flex", alignItems: "center", gap: "10px", padding: "9px 10px", borderRadius: "8px",
          border: "1px solid " + color + "44", background: bg, marginBottom: "6px" }
      },
        React.createElement("span", { style: { width: "20px", height: "20px", borderRadius: "5px", display: "flex",
          alignItems: "center", justifyContent: "center", fontSize: "12px", flexShrink: 0,
          background: color, color: "#0a0e17", fontWeight: 800 } }, ok ? "✓" : "✕"),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between" } },
            React.createElement("span", { style: { fontSize: "12px", fontWeight: 600 } }, label),
            React.createElement("span", { style: { fontSize: "9px", color: "#6e7681", fontFamily: "monospace" } }, cat)
          ),
          React.createElement("div", { style: { fontSize: "11px", color: "#8b949e" } }, detail)
        ),
        React.createElement("span", { style: { fontSize: "11px", fontWeight: 700, color, minWidth: "30px", textAlign: "right" } }, "+" + pts)
      );
    }
    function PlanBox(props) {
      return React.createElement("div", {
        style: { flex: 1, background: "#0a0e17", border: "1px solid #1f2937", borderRadius: "10px",
          padding: "10px 6px", textAlign: "center" }
      },
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", textTransform: "uppercase",
          letterSpacing: ".05em", marginBottom: "6px" } }, props.label),
        React.createElement("div", { style: { width: "16px", height: "3px", background: props.color,
          margin: "0 auto 6px", borderRadius: "2px" } }),
        React.createElement("div", { style: { fontSize: "12px", fontWeight: 700, fontFamily: "monospace",
          color: props.color } }, props.value)
      );
    }
    function ProbBox(props) {
      return React.createElement("div", {
        style: { flex: 1, background: "#0a0e17", border: "1px solid #1f2937", borderRadius: "10px",
          padding: "10px 6px", textAlign: "center" }
      },
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", textTransform: "uppercase",
          letterSpacing: ".05em", marginBottom: "4px" } }, props.label),
        React.createElement("div", { style: { fontSize: "18px", fontWeight: 800, color: props.color } }, props.value),
        React.createElement("div", { style: { fontSize: "9px", color: "#6e7681", marginTop: "2px" } }, props.sub)
      );
    }
    function ConfidenceDetail({ text }) {
      if (!text) return null;
      return React.createElement("div", { className: "confidence-detail" }, "🔍 " + text);
    }
    function EquityChart({ curve }) {
      if (!curve || curve.length < 2) return React.createElement("div", { style: { fontSize: "11px", color: "#6e7681", padding: "10px", textAlign: "center" } }, "Pas assez de données.");
      const maxEq = Math.max(1, ...curve.map(c => c.equity));
      const minEq = Math.min(0, ...curve.map(c => c.equity));
      const range = maxEq - minEq || 1;
      return React.createElement("div", { className: "equity-chart" },
        curve.map((p, i) => {
          const h = ((p.equity - minEq) / range) * 100;
          const color = p.equity >= 0 ? "#22c55e" : "#ef4444";
          return React.createElement("div", { key: i, className: "equity-bar", style: { height: Math.max(2, h) + '%', background: color } });
        })
      );
    }

    function RadarRow({ tf, smc, selTF, onSelect }) {
      if (!smc) {
        return React.createElement("div", { style: { marginBottom: "6px", opacity: 0.5 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "2px" } },
            React.createElement("span", { style: { fontSize: "11px", fontWeight: 600, color: "#6e7681" } }, tf.label, " (", tf.role, ")"),
            React.createElement("span", { style: { fontSize: "10px", color: "#6e7681" } }, "…")
          ),
          React.createElement("div", { style: { height: "4px", background: "#1f2937", borderRadius: "3px", overflow: "hidden" } })
        );
      }
      const isBull = smc.structure === "Haussier";
      const color = isBull ? "#22c55e" : "#ef4444";
      const dir = isBull ? "BUY" : "SELL";
      const prob = 50 + (isBull ? 20 : 0) + (smc.bos ? 10 : 0) + (smc.choch ? 5 : 0);
      const quality = prob >= 70 ? "EXCELLENT" : prob >= 55 ? "ATTENDRE" : "FAIBLE";
      const pts = Math.min(100, Math.max(0, prob));
      return React.createElement("div", { key: tf.id, style: { marginBottom: "6px", cursor: "pointer" } },
        React.createElement("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: "2px" } },
          React.createElement("span", { style: { fontSize: "11px", fontWeight: 600, color: tf.id === selTF ? "#e9b94e" : "#e6edf3" } },
            tf.label, " (", tf.role, ")"),
          React.createElement("div", { style: { display: "flex", gap: "8px", alignItems: "center" } },
            React.createElement("span", { style: { fontSize: "10px", fontWeight: 700, color: isBull ? "#22c55e" : "#ef4444" } }, dir),
            React.createElement("span", { style: { fontSize: "9px", color: "#6e7681" } }, Math.round(prob), "%"),
            React.createElement("span", { className: "quality-tag", style: { background: color + "22", color: color } }, quality),
            React.createElement("span", { style: { fontSize: "11px", fontWeight: 700, color: color } }, pts, "pts")
          )
        ),
        React.createElement("div", { style: { height: "4px", background: "#1f2937", borderRadius: "3px", overflow: "hidden" } },
          React.createElement("div", { style: { height: "100%", width: pts + "%", background: color, borderRadius: "3px", transition: "width .6s ease" } })
        )
      );
    }

    // ---- APP ----
    function App() {
      const [now, setNow] = useState(new Date());
      const [selPair, setSelPair] = useState("XAUUSD");
      const [selTF, setSelTF] = useState("M5");
      const [allData, setAllData] = useState(null);
      const [loading, setLoading] = useState(true);
      const [err, setErr] = useState("");
      const [lastSync, setLastSync] = useState(null);
      const [history, setHistory] = useState([]);
      const [journal, setJournal] = useState([]);
      const [stats, setStats] = useState(null);
      const [riskCapital, setRiskCapital] = useState(100);
      const [riskPercent, setRiskPercent] = useState(2);
      const [riskPipValue, setRiskPipValue] = useState(10);

      const pair = useMemo(() => PAIRS.find(p => p.id === selPair) || PAIRS[0], [selPair]);
      const tfConfig = useMemo(() => TF_LIST.find(t => t.id === selTF) || TF_LIST[1], [selTF]);

      const mins = useMemo(() => lomeMin(now), [now]);
      const kz = useMemo(() => activeKZ(mins), [mins]);

      // Chargement depuis data_smc.json
      const loadData = useCallback(async () => {
        setLoading(true);
        setErr("");
        try {
          const url = 'data_smc.json?t=' + Date.now();
          const resp = await fetch(url);
          if (!resp.ok) throw new Error('HTTP ' + resp.status);
          const data = await resp.json();
          setAllData(data);
          setLastSync(new Date());
          setLoading(false);
        } catch (e) {
          setErr(e.message || "Erreur de chargement");
          setLoading(false);
        }
      }, []);

      useEffect(() => {
        loadData();
        const interval = setInterval(loadData, 120000);
        return () => clearInterval(interval);
      }, [loadData]);

      useEffect(() => {
        const t = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(t);
      }, []);

      useEffect(() => {
        const j = getTradeJournal();
        setJournal(j);
        setStats(calculateStats(j));
      }, []);

      useEffect(() => {
        setRiskPipValue(pair.type === 'fx' ? 10 : 1);
      }, [pair]);

      const pairData = useMemo(() => {
        if (!allData || !allData.pairs) return null;
        return allData.pairs.find(p => p.id === selPair);
      }, [allData, selPair]);

      const tfData = useMemo(() => {
        if (!pairData || !pairData.timeframes) return null;
        return pairData.timeframes[selTF] || null;
      }, [pairData, selTF]);

      // Calcul du score (simplifié mais cohérent)
      const scoreTotal = useMemo(() => {
        if (!tfData) return 0;
        let score = 50;
        if (tfData.structure === "Haussier") score += 10;
        else if (tfData.structure === "Baissier") score += 0;
        else score += 5;
        if (tfData.bos) score += 10;
        if (tfData.choch) score += 8;
        if (tfData.zone === "Discount") score += 7;
        if (tfData.daily_bias === tfData.structure) score += 5;
        if (tfData.weekly_bias === tfData.structure) score += 5;
        return Math.min(100, Math.max(0, score));
      }, [tfData]);

      const dir = useMemo(() => {
        if (!tfData) return "PAS DE TRADE";
        return tfData.structure === "Haussier" ? "BUY" : "SELL";
      }, [tfData]);

      const sigColor = useMemo(() => {
        if (scoreTotal >= 70) return "#22c55e";
        if (scoreTotal >= 50) return "#eab308";
        return "#6e7681";
      }, [scoreTotal]);

      const quality = useMemo(() => {
        if (scoreTotal >= 70 && tfData && tfData.bos) return "EXCELLENT";
        if (scoreTotal >= 55) return "ATTENDRE";
        return "FAIBLE";
      }, [scoreTotal, tfData]);

      // Checklist complète
      const scoreItems = useMemo(() => {
        if (!tfData) return [];
        const items = [];
        items.push({ label: "Structure", ok: tfData.structure !== "Neutre", detail: tfData.structure, pts: 10, cat: "SMC" });
        items.push({ label: "BOS", ok: !!tfData.bos, detail: tfData.bos || "—", pts: 10, cat: "SMC" });
        items.push({ label: "CHoCH", ok: !!tfData.choch, detail: tfData.choch || "—", pts: 8, cat: "SMC" });
        items.push({ label: "Zone", ok: tfData.zone === "Discount", detail: tfData.zone, pts: 7, cat: "SMC" });
        items.push({ label: "Daily Bias", ok: tfData.daily_bias === tfData.structure, detail: tfData.daily_bias, pts: 5, cat: "Biais" });
        items.push({ label: "Weekly Bias", ok: tfData.weekly_bias === tfData.structure, detail: tfData.weekly_bias, pts: 5, cat: "Biais" });
        items.push({ label: "RSI", ok: tfData.rsi > 30 && tfData.rsi < 70, detail: tfData.rsi.toFixed(1), pts: 5, cat: "Indicateur" });
        return items;
      }, [tfData]);

      // Plan de trade simplifié
      const plan = useMemo(() => {
        if (!tfData || !tfData.live_price || !tfData.atr) return null;
        const atr = tfData.atr;
        const price = tfData.live_price;
        const isBull = tfData.structure === "Haussier";
        const entry = price;
        const sl = isBull ? entry - atr * 2 : entry + atr * 2;
        const tp1 = isBull ? entry + atr * 2 : entry - atr * 2;
        const tp2 = isBull ? entry + atr * 4 : entry - atr * 4;
        const tp3 = isBull ? entry + atr * 6 : entry - atr * 6;
        const be = isBull ? entry + atr * 0.5 : entry - atr * 0.5;
        return { entry, sl, tp1, tp2, tp3, be };
      }, [tfData]);

      // Open trade
      const openTrade = () => {
        if (!tfData || !tfData.live_price) return;
        const trade = {
          pair: pair.label,
          timeframe: tfConfig.label,
          direction: dir,
          entryPrice: tfData.live_price,
          slPrice: plan ? plan.sl : tfData.live_price - (tfData.atr || 1) * 2,
          tp1Price: plan ? plan.tp1 : tfData.live_price + (tfData.atr || 1) * 2,
          tp2Price: plan ? plan.tp2 : tfData.live_price + (tfData.atr || 1) * 4,
          tp3Price: plan ? plan.tp3 : tfData.live_price + (tfData.atr || 1) * 6,
          bePrice: plan ? plan.be : tfData.live_price + (tfData.atr || 1) * 0.5,
          score: scoreTotal,
          proba: Math.round(scoreTotal * 0.8 + 20),
          rMultiple: 2,
          signalId: Date.now()
        };
        const newJournal = addTradeToJournal(trade);
        setJournal(newJournal);
        setStats(calculateStats(newJournal));
      };

      const closeTradeById = (id, result, exitPrice, rMultiple) => {
        const nj = updateTradeResult(id, result, exitPrice, rMultiple);
        setJournal(nj);
        setStats(calculateStats(nj));
      };

      // Auto-close
      useEffect(() => {
        const interval = setInterval(() => {
          const j = getTradeJournal();
          const pending = j.filter(t => t.result === 'pending');
          if (pending.length === 0) return;
          pending.forEach(trade => {
            const pObj = PAIRS.find(p => p.label === trade.pair);
            if (!pObj) return;
            const tfObj = TF_LIST.find(tf => tf.label === trade.timeframe);
            if (!tfObj) return;
            const pData = allData?.pairs?.find(p => p.id === pObj.id);
            if (!pData) return;
            const tfD = pData.timeframes?.[tfObj.id];
            if (!tfD) return;
            const price = tfD.live_price;
            if (!price) return;
            if (trade.direction === 'BUY') {
              if (price <= trade.slPrice) closeTradeById(trade.id, 'loss', trade.slPrice, -1);
              else if (price >= trade.tp1Price) closeTradeById(trade.id, 'win', trade.tp1Price, 1);
            } else {
              if (price >= trade.slPrice) closeTradeById(trade.id, 'loss', trade.slPrice, -1);
              else if (price <= trade.tp1Price) closeTradeById(trade.id, 'win', trade.tp1Price, 1);
            }
          });
        }, 5000);
        return () => clearInterval(interval);
      }, [allData]);

              );

        // Radar
        React.createElement(Card, null,

            )

            "📈 Ouvrir trade " + dir
          )
        ),

        // Journal
        React.createElement(Card, null,
          React.createElement(SecTitle, null, "📋 Journal (", journal.length, ")"),

            const cls = t.result === 'win' ? 'win' : t.result === 'loss' ? 'loss' : 'pending';
            const label = t.result === 'win' ? '✅' : t.result === 'loss' ? '❌' : '⏳';
            return React.createElement("div", { key: t.id, className: "journal-item" },

              React.createElement("span", { className: "result " + cls }, label)
            );

        ),

        // Stats
        stats && React.createElement(Card, null,
          React.createElement(SecTitle, null, "📈 Stats"),
          React.createElement("div", { style: { display: "flex", gap: "6px" } },
            React.createElement("div", { className: "stat-box" },

            ),

        ),

        // Footer
        React.createElement("div", { style: { textAlign: "center", fontSize: "9px", color: "#6e7681", marginTop: "16px", lineHeight: 1.8, borderTop: "1px solid #1f2937", paddingTop: "12px" } },
          "BLACKZELDON SCANNER · OSCAR v10.1 (Pro — Optimisé complet)", React.createElement("br"),
          "⚡ Données SMC pré-calculées — chargement instantané", React.createElement("br"),
          "⚠️ vérifie toujours sur MT5 avant d'agir"
        )
      );
    }

    var root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(React.createElement(App));

  } catch (e) {
    document.getElementById('root').innerHTML = '<div style="background:#1a0a0a;border:2px solid #ef4444;border-radius:12px;padding:20px;color:#ef4444;font-family:monospace;font-size:13px;white-space:pre-wrap;word-break:break-word;"><strong>❌ Erreur :</strong><br><br>' + e.message + '<br><br>' + (e.stack || '').replace(/\n/g, '<br>') + '</div>';
    console.error('Blackzeldon Error:', e);
  }
}
