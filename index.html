<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3;overscroll-behavior:none;}

.stat-value{font-size:20px;font-weight:700;}

.journal-item .result.loss{color:#ef4444;}

.request-status{background:#1f2937;border-radius:6px;padding:6px 10px;margin-bottom:8px;font-size:11px;display:flex;flex-wrap:wrap;gap:4px;}
.request-status .item{background:#0a0e17;border-radius:4px;padding:3px 8px;border-left:3px solid;display:flex;align-items:center;gap:6px;}
.request-status .item .label{color:#8b949e;}
.request-status .item .status{font-weight:600;}
.request-status .item .status.pending{color:#eab308;}
.request-status .item .status.running{color:#58a6ff;}

.request-status .item .timer{color:#6e7681;font-family:monospace;}
.quality-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;}
.equity-chart{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #1f2937;height:120px;display:flex;align-items:flex-end;gap:2px;overflow:hidden;}

.market-closed-banner{background:rgba(239,68,68,.1);border:1px solid #ef444455;border-radius:10px;padding:10px 12px;margin-bottom:10px;font-size:12px;color:#ef4444;display:flex;align-items:center;gap:8px;}
</style>

<body>
<div id="root"></div>
<script>
// ================================================================
// BLACKZELDON SCANNER — OSCAR v10.1 (Pro — Corrigé)
// ================================================================

if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
  document.getElementById('root').innerHTML = '<div style="color:#ef4444;padding:20px;">❌ React non chargé.</div>';
} else {
  try {
    const { useState, useEffect, useRef, useCallback, useMemo } = React;

    // ---- CONFIG ----
    const PAIRS = [
      {id:"XAUUSD",label:"XAU/USD",symbol:"XAU/USD",digits:2,pip:0.1,type:"fx"},
      {id:"USDJPY",label:"USD/JPY",symbol:"USD/JPY",digits:3,pip:.01,type:"fx"},
      {id:"USDCAD",label:"USD/CAD",symbol:"USD/CAD",digits:5,pip:.0001,type:"fx"},
    ];

    const TF_LIST_RADAR = [
      {id:"1min", label:"M1",  apiInterval:"1min",  role:"scalp",     outputsize:80,  cacheSec:45,  atrP:14},
      {id:"5min", label:"M5",  apiInterval:"5min",  role:"entrée",    outputsize:100, cacheSec:90,  atrP:14},
      {id:"15min",label:"M15", apiInterval:"15min", role:"setup",     outputsize:100, cacheSec:180,  atrP:14},
      {id:"1h",   label:"H1",  apiInterval:"1h",    role:"biais",     outputsize:80,  cacheSec:300, atrP:14},
      {id:"4h",   label:"H4",  apiInterval:"4h",    role:"structure", outputsize:60,  cacheSec:2400, atrP:14},
      {id:"1day", label:"D1",  apiInterval:"1day",  role:"daily",     outputsize:60,  cacheSec:2400, atrP:10},
    ];

    const TF_LIST = [
      {id:"1min", label:"M1",  apiInterval:"1min",  role:"scalp",     outputsize:80,  cacheSec:45,  atrP:14},
      {id:"5min", label:"M5",  apiInterval:"5min",  role:"entrée",    outputsize:100, cacheSec:90,  atrP:14},
      {id:"15min",label:"M15", apiInterval:"15min", role:"setup",     outputsize:100, cacheSec:180,  atrP:14},
      {id:"1h",   label:"H1",  apiInterval:"1h",    role:"biais",     outputsize:80,  cacheSec:300, atrP:14},
      {id:"4h",   label:"H4",  apiInterval:"4h",    role:"structure", outputsize:60,  cacheSec:2400, atrP:14},
      {id:"1day", label:"D1",  apiInterval:"1day",  role:"daily",     outputsize:60,  cacheSec:2400, atrP:10},
      {id:"1week",label:"W1",  apiInterval:"1week", role:"weekly",    outputsize:30,  cacheSec:2400,atrP:10},
    ];

    const KZ = [
      {id:"london",label:"London",  start:480, end:600},
      {id:"ny",    label:"New York",start:780, end:900},
      {id:"asia",  label:"Asie",    start:0,   end:180},
    ];

    const LOME = "Africa/Lome";
    const API = "https://api.twelvedata.com";

    // ---- FONCTIONS UTILES ----
    function fmtTime(d) {
      try { return new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", second: "2-digit", hour12: false, timeZone: LOME }).format(d); }
      catch(e) { return d.toLocaleTimeString("fr-FR"); }
    }
    function fmtHM(d) {
      try { return new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: LOME }).format(d); }
      catch(e) { return d.toLocaleTimeString("fr-FR", { hour: "2-digit", minute: "2-digit" }); }
    }
    function lomeMin(d) {
      try {
        const p = new Intl.DateTimeFormat("fr-FR", { hour: "2-digit", minute: "2-digit", hour12: false, timeZone: LOME }).formatToParts(d);
        return parseInt(p.find(x => x.type === "hour").value) * 60 + parseInt(p.find(x => x.type === "minute").value);
      } catch(e) { return d.getHours() * 60 + d.getMinutes(); }
    }
    function activeKZ(m) {
      return KZ.find(k => m >= k.start && m < k.end) || null;
    }
    function isCrypto(pair) { return pair && pair.type === 'crypto'; }
    function activeKZForPair(m, pair) {
      if (isCrypto(pair)) return null;
      return activeKZ(m);
    }

    // ---- CACHE ----
    const CACHE = {};
    function getCache(key) {
      const entry = CACHE[key];
      if (entry && entry.ts && entry.data && (Date.now() - entry.ts) < entry.ttl * 1000) return entry.data;
      return null;
    }
    function setCache(key, data, ttl) { CACHE[key] = { ts: Date.now(), data, ttl }; }
    setInterval(() => {
      const now = Date.now();
      for (const k in CACHE) if (now - CACHE[k].ts > CACHE[k].ttl * 1000) delete CACHE[k];
    }, 60000);

    // ---- FILE D'ATTENTE ----
    let REQUEST_QUEUE = [];
    let IS_PROCESSING = false;
    let LAST_REQUEST_TIME = 0;
    const MIN_REQUEST_INTERVAL = 6000;
    const RATE_LIMIT_WAIT = 12000;
    const IN_FLIGHT = new Set();
    let PRIORITY_IN_FLIGHT = 0;
    const MAX_PRIORITY_CONCURRENT = 2;
    let REQUEST_SEQUENCE = 0;
    const REQUEST_STATUS = {};
    let STATUS_LISTENERS = [];

    function setRequestStatus(key, status, message, seq) {
      REQUEST_STATUS[key] = { status, message, timestamp: Date.now(), seq: seq || 0 };
      STATUS_LISTENERS.forEach(fn => fn(REQUEST_STATUS));
    }
    function subscribeStatus(fn) {
      STATUS_LISTENERS.push(fn);
      return () => { STATUS_LISTENERS = STATUS_LISTENERS.filter(f => f !== fn); };
    }
    function clearRequestStatus(key) { delete REQUEST_STATUS[key]; STATUS_LISTENERS.forEach(fn => fn(REQUEST_STATUS)); }

    function processQueue() {
      if (IS_PROCESSING || REQUEST_QUEUE.length === 0) return;
      const now = Date.now();
      const timeSinceLast = now - LAST_REQUEST_TIME;
      if (timeSinceLast < MIN_REQUEST_INTERVAL) {
        setTimeout(processQueue, MIN_REQUEST_INTERVAL - timeSinceLast);
        return;
      }
      IS_PROCESSING = true;
      const task = REQUEST_QUEUE.shift();
      LAST_REQUEST_TIME = Date.now();
      task().finally(() => { IS_PROCESSING = false; processQueue(); });
    }
    function enqueueRequest(fn) {
      return new Promise((resolve, reject) => {
        const seq = REQUEST_SEQUENCE++;
        REQUEST_QUEUE.push(async () => {
          try { const result = await fn(); resolve(result); }
          catch (e) { reject(e); }
        });
        processQueue();
      });
    }
    function clearQueue() { REQUEST_QUEUE = []; IN_FLIGHT.clear(); }

    // ---- REQUÊTES ----
    // ============================================================
    //  fetchPriority MODIFIÉE : lit d'abord depuis data.json
    // ============================================================
    async function fetchPriority(symbol, interval, apiKey, outputsize, cacheSec, signal, retries = 0) {
      if (!signal || typeof signal.aborted !== 'boolean') throw new Error('Signal invalide');
      const key = symbol + '_' + interval;
      const cached = getCache(key);
      if (cached) {
        setRequestStatus(key, 'done', '✅ Cache');
        return cached;
      }
      
      // ============================================================
      //  1. Lire depuis data.json (public)
      // ============================================================
      try {
        const dataUrl = 'https://raw.githubusercontent.com/frankensteinamekoudi-wq/Blackscanner-live/main/data.json';
        const resp = await fetch(dataUrl + '?t=' + Date.now(), { signal, cache: 'no-cache' });
        if (resp.ok) {
          const allData = await resp.json();
          
          let candles = null;
          if (allData.pairs && Array.isArray(allData.pairs)) {
            for (const p of allData.pairs) {
              if (p.id === symbol || p.symbol === symbol) {
                if (p.candles && p.candles[interval]) {
                  candles = p.candles[interval];
                  break;
                }
              }
            }
          }
          
          if (candles && candles.length > 0) {
            if (typeof candles[0] === 'object' && candles[0].close !== undefined) {
              setCache(key, candles, cacheSec);
              setRequestStatus(key, 'done', '✅ data.json');
              return candles;
            }
          }
        }
      } catch(e) {
        // Silencieux
      }
      
      // ============================================================
      //  2. Fallback : API Twelve Data
      // ============================================================
      console.log('📡 Fallback API Twelve pour', symbol, interval);
      return fetchPriorityAPI(symbol, interval, apiKey, outputsize, cacheSec, signal, retries);
    }

    async function fetchPriorityAPI(symbol, interval, apiKey, outputsize, cacheSec, signal, retries = 0) {
      if (!signal || typeof signal.aborted !== 'boolean') throw new Error('Signal invalide');
      const key = symbol + '_' + interval;
      while (PRIORITY_IN_FLIGHT >= MAX_PRIORITY_CONCURRENT) {
        await new Promise(r => setTimeout(r, 100));
        if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
      }
      PRIORITY_IN_FLIGHT++;
      const seq = REQUEST_SEQUENCE++;
      setRequestStatus(key, 'running', '⟳ Chargement...', seq);
      try {
        const url = API + '/time_series?symbol=' + encodeURIComponent(symbol) + '&interval=' + interval + '&outputsize=' + outputsize + '&apikey=' + apiKey;
        const res = await fetch(url, { signal });
        if (res.status === 429) {
          PRIORITY_IN_FLIGHT--;
          const wait = Math.min(RATE_LIMIT_WAIT, 1000 * Math.pow(2, Math.min(retries, 6)));
          setRequestStatus(key, 'pending', `⏳ Rate-limit, attente ${Math.round(wait/1000)}s`, seq);
          await new Promise(r => setTimeout(r, wait));
          if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
          return fetchPriorityAPI(symbol, interval, apiKey, outputsize, cacheSec, signal, retries + 1);
        }
        const data = await res.json();
        if (data.status === "error" || !data.values) throw new Error(data.message || "Erreur API");
        const candles = data.values.map(v => ({
          time: v.datetime,
          open: parseFloat(v.open),
          high: parseFloat(v.high),
          low: parseFloat(v.low),
          close: parseFloat(v.close),
          volume: parseFloat(v.volume) || 0
        })).reverse();
        setCache(key, candles, cacheSec);
        setRequestStatus(key, 'done', '✅ Terminé', seq);
        PRIORITY_IN_FLIGHT--;
        return candles;
      } catch(e) {
        if (e.name === 'AbortError') setRequestStatus(key, 'done', '⏹️ Annulée', seq);
        else setRequestStatus(key, 'error', '⚠️ Erreur: ' + e.message, seq);
        PRIORITY_IN_FLIGHT--;
        throw e;
      }
    }

    async function fetchWithCache(symbol, interval, apiKey, outputsize, cacheSec, signal) {
      if (!signal || typeof signal.aborted !== 'boolean') return Promise.reject(new Error('Signal invalide'));
      const key = symbol + '_' + interval;
      const cached = getCache(key);
      if (cached) return cached;
      if (IN_FLIGHT.has(key)) {
        setRequestStatus(key, 'pending', '⏳ En attente');
        return new Promise((resolve, reject) => {
          const check = () => {
            if (signal.aborted) { reject(new DOMException('Aborted', 'AbortError')); return; }
            if (!IN_FLIGHT.has(key)) { const c = getCache(key); if (c) resolve(c); else reject(new Error('Cache absent')); }
            else setTimeout(check, 100);
          };
          check();
        });
      }
      IN_FLIGHT.add(key);
      const seq = REQUEST_SEQUENCE++;
      setRequestStatus(key, 'running', '⟳ File d\'attente...', seq);
      try {
        const data = await enqueueRequest(async () => {
          const url = API + '/time_series?symbol=' + encodeURIComponent(symbol) + '&interval=' + interval + '&outputsize=' + outputsize + '&apikey=' + apiKey;
          let attempt = 0;
          while (true) {
            const res = await fetch(url, { signal });
            if (res.status === 429) {
              attempt++;
              if (attempt > 8) throw new Error('Rate-limit persistant, abandon');
              const wait = Math.min(RATE_LIMIT_WAIT, 1000 * Math.pow(2, Math.min(attempt, 6)));
              setRequestStatus(key, 'pending', `⏳ Rate-limit, attente ${Math.round(wait/1000)}s`, seq);
              await new Promise(r => setTimeout(r, wait));
              if (signal.aborted) throw new DOMException('Aborted', 'AbortError');
              continue;
            }
            const data = await res.json();
            if (data.status === "error" || !data.values) throw new Error(data.message || "Erreur API");
            const candles = data.values.map(v => ({
              time: v.datetime,
              open: parseFloat(v.open),
              high: parseFloat(v.high),
              low: parseFloat(v.low),
              close: parseFloat(v.close),
              volume: parseFloat(v.volume) || 0
            })).reverse();
            setCache(key, candles, cacheSec);
            setRequestStatus(key, 'done', '✅ Terminé', seq);
            return candles;
          }
        });
        IN_FLIGHT.delete(key);
        return data;
      } catch(e) {
        if (e.name === 'AbortError') setRequestStatus(key, 'done', '⏹️ Annulée', seq);
        else setRequestStatus(key, 'error', '⚠️ Erreur: ' + e.message, seq);
        IN_FLIGHT.delete(key);
        throw e;
      }
    }

    // ---- NEWS ----
    async function fetchNews(apiKey) {
      if (!apiKey) return [];
      try {
        const url = `https://finnhub.io/api/v1/calendar/economic?token=${apiKey}`;
        const res = await fetch(url);
        if (res.ok) {
          const data = await res.json();
          if (data && data.economicCalendar) {
            const now = Date.now();
            return data.economicCalendar
              .filter(e => e.impact && (e.impact === 'high' || e.impact === 'medium'))
              .filter(e => new Date(e.releaseDate).getTime() > now - 3600000)
              .sort((a,b) => new Date(a.releaseDate) - new Date(b.releaseDate))
              .slice(0, 5)
              .map(e => ({ time: new Date(e.releaseDate), title: e.event, impact: e.impact.toLowerCase(), currency: e.currency || 'USD' }));
          }
        }
      } catch(e) {}
      return [];
    }

    // ---- JOURNAL ----
    function getTradeJournal() {
      try { const d = localStorage.getItem('blackzeldon_journal_v10'); return d ? JSON.parse(d) : []; }
      catch(e) { return []; }
    }
    function saveTradeJournal(j) { try { localStorage.setItem('blackzeldon_journal_v10', JSON.stringify(j)); } catch(e) {} }
    function addTradeToJournal(trade) {
      const j = getTradeJournal();
      const entry = { id: Date.now(), ...trade, timestamp: Date.now(), result: 'pending' };
      j.push(entry);
      saveTradeJournal(j);
      return j;
    }
    function updateTradeResult(id, result, exitPrice, rMultiple) {
      const j = getTradeJournal();
      const idx = j.findIndex(t => t.id === id);
      if (idx !== -1) {
        j[idx].result = result;
        j[idx].exitPrice = exitPrice;
        j[idx].closedAt = Date.now();
        if (rMultiple !== undefined) j[idx].rMultiple = rMultiple;
        saveTradeJournal(j);
      }
      return j;
    }
    function calculateStats(journal) {
      const closed = journal.filter(t => t.result !== 'pending' && t.result !== undefined);
      const total = closed.length;
      if (total === 0) return null;
      const wins = closed.filter(t => t.result === 'win').length;
      const losses = closed.filter(t => t.result === 'loss').length;
      const winrate = total > 0 ? wins / total : 0;
      let totalGain = 0, totalLoss = 0, gains = [], lossesArr = [];
      closed.forEach(t => {
        const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
        if (t.result === 'win') { totalGain += r; gains.push(r); }
        else { totalLoss += 1; lossesArr.push(1); }
      });
      const profitFactor = totalLoss > 0 ? totalGain / totalLoss : 0;
      const avgGain = gains.length > 0 ? gains.reduce((a,b) => a+b, 0) / gains.length : 0;
      const avgLoss = lossesArr.length > 0 ? lossesArr.reduce((a,b) => a+b, 0) / lossesArr.length : 0;
      let equity = 0, peak = 0, maxDrawdown = 0, maxDrawdownR = 0, equityCurve = [];
      let currentStreak = 0, streakType = null, maxWinStreak = 0, maxLossStreak = 0;
      closed.forEach(t => {
        const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
        if (t.result === 'win') { equity += r; if (streakType === 'win') currentStreak++; else { currentStreak = 1; streakType = 'win'; } maxWinStreak = Math.max(maxWinStreak, currentStreak); }
        else { equity -= 1; if (streakType === 'loss') currentStreak++; else { currentStreak = 1; streakType = 'loss'; } maxLossStreak = Math.max(maxLossStreak, currentStreak); }
        if (equity > peak) peak = equity;
        const ddR = peak - equity; if (ddR > maxDrawdownR) maxDrawdownR = ddR;
        const dd = peak > 0 ? (peak - equity) / peak * 100 : 0; if (dd > maxDrawdown) maxDrawdown = dd;
        equityCurve.push({ index: equityCurve.length, equity, dd });
      });
      const byPair = {}, byTF = {};
      closed.forEach(t => {
        const pair = t.pair;
        if (!byPair[pair]) byPair[pair] = { wins: 0, losses: 0, total: 0 };
        byPair[pair].total++; if (t.result === 'win') byPair[pair].wins++; else byPair[pair].losses++;
        const tf = t.timeframe;
        if (!byTF[tf]) byTF[tf] = { wins: 0, losses: 0, total: 0 };
        byTF[tf].total++; if (t.result === 'win') byTF[tf].wins++; else byTF[tf].losses++;
      });
      const signalReliability = {};
      closed.forEach(t => {
        if (t.scores) {
          Object.keys(t.scores).forEach(key => {
            if (!signalReliability[key]) signalReliability[key] = { total: 0, wins: 0 };
            signalReliability[key].total++;
            if (t.result === 'win') signalReliability[key].wins++;
          });
        }
      });
      return { total, wins, losses, winrate, profitFactor, avgGain, avgLoss, maxDrawdown, maxDrawdownR, maxWinStreak, maxLossStreak, equityCurve, byPair, byTF, signalReliability };
    }

    function getSignalJournal() {
      try { const d = localStorage.getItem('blackzeldon_signal_journal_v10'); return d ? JSON.parse(d) : []; }
      catch(e) { return []; }
    }
    function saveSignalJournal(j) { try { localStorage.setItem('blackzeldon_signal_journal_v10', JSON.stringify(j)); } catch(e) {} }
    function addSignalToJournal(signal) {
      const j = getSignalJournal();
      const entry = { id: Date.now(), ...signal, timestamp: Date.now() };
      j.push(entry);
      if (j.length > 2000) j.splice(0, j.length - 2000);
      saveSignalJournal(j);
      return j;
    }

    function getLearnedWeights() {
      try { const d = localStorage.getItem('blackzeldon_learned_weights_v10'); return d ? JSON.parse(d) : null; }
      catch(e) { return null; }
    }
    function saveLearnedWeights(w) {
      try { localStorage.setItem('blackzeldon_learned_weights_v10', JSON.stringify(w)); }
      catch(e) {}
    }

    // ---- INDICATEURS ----
    function calcEMA(data, p) { const k=2/(p+1); const r=[data[0]]; for(let i=1;i<data.length;i++) r.push(data[i]*k+r[i-1]*(1-k)); return r; }
    function calcRSI(closes, p=14) { let g=0,l=0; for(let i=1;i<=p;i++){const d=closes[i]-closes[i-1]; if(d>0)g+=d;else l-=d;} let ag=g/p, al=l/p; const r=[100-100/(1+ag/al)]; for(let j=p+1;j<closes.length;j++){const d=closes[j]-closes[j-1]; const g2=d>0?d:0; const l2=d<0?-d:0; ag=(ag*(p-1)+g2)/p; al=(al*(p-1)+l2)/p; r.push(al===0?100:100-100/(1+ag/al));} return r; }
    function calcMACD(closes, f=12, s=26, sig=9) { const ef=calcEMA(closes,f); const es=calcEMA(closes,s); const ml=ef.map((v,i)=>v-es[i]); const sl=calcEMA(ml,sig); const hist=ml.map((v,i)=>v-sl[i]); return {macdLine:ml, signalLine:sl, histogram:hist}; }
    function calcBB(closes, p=20, sd=2) { const r=[]; for(let i=p-1;i<closes.length;i++){const slice=closes.slice(i-p+1,i+1); const mean=slice.reduce((a,b)=>a+b,0)/slice.length; const std=Math.sqrt(slice.reduce((a,b)=>a+Math.pow(b-mean,2),0)/slice.length); r.push({upper:mean+sd*std, middle:mean, lower:mean-sd*std});} return r; }
    function calcATR(candles, p=14) { const tr=[]; for(let i=1;i<candles.length;i++){const h=candles[i].high,l=candles[i].low,pc=candles[i-1].close; tr.push(Math.max(h-l, Math.abs(h-pc), Math.abs(l-pc)));} let atr=tr.slice(0,p).reduce((a,b)=>a+b,0)/p; for(let j=p;j<tr.length;j++) atr=(atr*(p-1)+tr[j])/p; return atr; }
    function calcIchimoku(highs, lows) { const n=highs.length; const t=n>=9?(Math.max(...highs.slice(-9))+Math.min(...lows.slice(-9)))/2:null; const k=n>=26?(Math.max(...highs.slice(-26))+Math.min(...lows.slice(-26)))/2:null; const sa=t&&k?(t+k)/2:null; const sb=n>=52?(Math.max(...highs.slice(-52))+Math.min(...lows.slice(-52)))/2:null; return {tenkan:t,kijun:k,senkouA:sa,senkouB:sb}; }
    function calcPivots(highs, lows) { const r=[], s=[]; for(let i=2;i<highs.length-2;i++){if(highs[i]>highs[i-1]&&highs[i]>highs[i-2]&&highs[i]>highs[i+1]&&highs[i]>highs[i+2]) r.push(highs[i]); if(lows[i]<lows[i-1]&&lows[i]<lows[i-2]&&lows[i]<lows[i+1]&&lows[i]<lows[i+2]) s.push(lows[i]);} return {res:r.slice(-3), sup:s.slice(-3)}; }
    function detectPatterns(candles) { const p=[]; for(let i=candles.length-5;i<candles.length;i++){if(i<0)continue; const c=candles[i]; const body=Math.abs(c.close-c.open); const range=c.high-c.low||0.0001; if(body/range<0.1)p.push({type:"Doji",icon:"⏺"}); else if(c.close>c.open){const lw=c.open-c.low, uw=c.high-c.close; if(lw>body*2&&uw<body*0.5)p.push({type:"Hammer",icon:"🔨"});}else{const uw2=c.high-c.open, lw2=c.close-c.low; if(uw2>body*2&&lw2<body*0.5)p.push({type:"Shooting Star",icon:"⭐"});}} if(candles.length>=2){const c1=candles[candles.length-2], c2=candles[candles.length-1]; if(c1.close<c1.open&&c2.close>c2.open&&c2.open<c1.close&&c2.close>c1.open)p.push({type:"Bullish Engulfing",icon:"🐂"}); if(c1.close>c1.open&&c2.close<c2.open&&c2.open>c1.close&&c2.close<c1.open)p.push({type:"Bearish Engulfing",icon:"🐻"});} return p; }
    function detectDivergence(closes, rsiVals) { const offset=closes.length-rsiVals.length; if(rsiVals.length<6||closes.length<6+offset)return[]; const r=[]; const n=closes.length; const c1=closes[n-1], c2=closes[n-5]; const r1=rsiVals[rsiVals.length-1], r2=rsiVals[rsiVals.length-5]; if(c1>c2&&r1<r2)r.push({type:"bearish",label:"Divergence Baissière RSI"}); if(c1<c2&&r1>r2)r.push({type:"bullish",label:"Divergence Haussière RSI"}); return r; }

    // ---- NOUVELLES FONCTIONS AVANCÉES ----
    function detectManipulation(candles, structure) {
      const n = candles.length;
      if (n < 10) return { fakeBos: false, inducement: null, score: 100 };
      let fakeBos = false;
      let inducement = null;
      const range = Math.max(...candles.slice(-30).map(c => c.high)) - Math.min(...candles.slice(-30).map(c => c.low));
      if (range === 0) return { fakeBos: false, inducement: null, score: 100 };
      for (let i = n-6; i < n-2; i++) {
        const c = candles[i];
        const prevHigh = Math.max(...candles.slice(Math.max(0,i-5), i).map(c => c.high));
        const prevLow = Math.min(...candles.slice(Math.max(0,i-5), i).map(c => c.low));
        if (structure === "Haussier" && c.high > prevHigh + range * 0.01) {
          let retrace = 0;
          for (let j = i+1; j < Math.min(i+4, n); j++) {
            if (candles[j].close < c.high - range * 0.005) retrace++;
          }
          if (retrace >= 2) fakeBos = true;
        }
        if (structure === "Baissier" && c.low < prevLow - range * 0.01) {
          let retrace = 0;
          for (let j = i+1; j < Math.min(i+4, n); j++) {
            if (candles[j].close > c.low + range * 0.005) retrace++;
          }
          if (retrace >= 2) fakeBos = true;
        }
      }
      if (n > 8) {
        const c1 = candles[n-3], c2 = candles[n-2], c3 = candles[n-1];
        if (c2.high > Math.max(c1.high, c3.high) && c2.close < c2.open && c3.close < c3.open) {
          inducement = "bear";
        }
        if (c2.low < Math.min(c1.low, c3.low) && c2.close > c2.open && c3.close > c3.open) {
          inducement = "bull";
        }
      }
      const score = fakeBos ? 60 : (inducement ? 70 : 100);
      return { fakeBos, inducement, score };
    }

    function calcVolumeProfile(candles) {
      if (candles.length < 10) return { profile: [], poc: null, delta: 0, score: 50 };
      const levels = {};
      candles.forEach(c => {
        const steps = Math.max(1, Math.round((c.high - c.low) / 0.001));
        for (let i = 0; i <= steps; i++) {
          const price = c.low + (c.high - c.low) * (i / steps);
          const key = Math.round(price * 10000) / 10000;
          if (!levels[key]) levels[key] = 0;
          levels[key] += c.volume || 1;
        }
      });
      const sorted = Object.entries(levels).sort((a,b) => b[1] - a[1]);
      const poc = sorted.length > 0 ? parseFloat(sorted[0][0]) : null;
      let delta = 0;
      candles.forEach(c => {
        const body = c.close - c.open;
        const vol = c.volume || 1;
        if (body > 0) delta += vol;
        else if (body < 0) delta -= vol;
      });
      const last = candles[candles.length-1].close;
      const score = poc ? Math.max(0, 100 - Math.abs(last - poc) / (candles[candles.length-1].high - candles[candles.length-1].low || 0.001) * 10) : 50;
      return { profile: sorted.slice(0,5).map(([p,v]) => ({ price: parseFloat(p), volume: v })), poc, delta, score: Math.min(100, score) };
    }

    function cascadeConfluence(higherData, structure) {
      const tfs = [
        { key: 'daily', weight: 20, label: 'D1' },
        { key: 'weekly', weight: 15, label: 'W1' },
        { key: 'h4', weight: 12, label: 'H4' },
        { key: 'h1', weight: 8, label: 'H1' },
        { key: 'm15', weight: 5, label: 'M15' },
        { key: 'm5', weight: 3, label: 'M5' },
      ];
      let score = 0, totalWeight = 0, details = [];
      tfs.forEach(tf => {
        const data = higherData[tf.key];
        if (data && data.structure) {
          const aligned = data.structure === structure;
          const pts = aligned ? tf.weight : 0;
          score += pts;
          totalWeight += tf.weight;
          details.push({ label: tf.label, aligned, pts });
        }
      });
      const total = totalWeight > 0 ? Math.round((score / totalWeight) * 100) : 50;
      return { score: total, details };
    }

    function cryptoLiquidityFilter(pair) {
      if (!isCrypto(pair)) return { penalty: 0, reason: 'N/A' };
      const now = new Date();
      const utcHour = now.getUTCHours();
      const utcDay = now.getUTCDay();
      let penalty = 0, reason = '';
      if (utcDay === 0 || utcDay === 6) { penalty += 20; reason = 'Week-end'; }
      if (utcHour >= 0 && utcHour < 8) { penalty += 10; reason = reason ? reason + ' + nuit' : 'Nuit'; }
      return { penalty, reason: reason || 'Liquidité normale' };
    }

    function dynamicRiskManagement(scoreTotal, prob, manipulationScore, volumeScore, confluenceScore) {
      let riskPercent = 2;
      if (scoreTotal >= 80 && prob >= 0.7 && manipulationScore > 80) riskPercent = 3;
      else if (scoreTotal >= 65 && prob >= 0.6 && manipulationScore > 70) riskPercent = 2.5;
      else if (scoreTotal < 50 || prob < 0.45 || manipulationScore < 60) riskPercent = 1.5;
      if (volumeScore < 50) riskPercent *= 0.8;
      if (confluenceScore < 50) riskPercent *= 0.9;
      return Math.max(0.5, Math.min(3.5, riskPercent));
    }

    function getMLModel() {
      try { return JSON.parse(localStorage.getItem('blackzeldon_ml_model_v10')); } catch(e) { return null; }
    }
    function saveMLModel(model) {
      try { localStorage.setItem('blackzeldon_ml_model_v10', JSON.stringify(model)); } catch(e) {}
    }
    function trainMLModel(signalJournal, tradeJournal) {
      const merged = signalJournal.map(sig => {
        const trade = tradeJournal.find(t => t.signalId === sig.id || (t.pair === sig.pair && t.timeframe === sig.timeframe && Math.abs(t.timestamp - sig.timestamp) < 60000));
        return { ...sig, tradeResult: trade ? trade.result : null, rMultiple: trade ? trade.rMultiple : null };
      });
      const closed = merged.filter(s => s.tradeResult === 'win' || s.tradeResult === 'loss');
      if (closed.length < 30) return null;

      const features = [];
      const labels = [];
      closed.forEach(s => {
        const scores = s.scores || {};
        const f = [
          scores['BOS'] || 0,
          scores['CHoCH'] || 0,
          scores['Zone P/D'] || 0,
          scores['Sweep Liq.'] || 0,
          scores['Order Block'] || 0,
          scores['FVG'] || 0,
          scores['RSI'] || 0,
          scores['MACD'] || 0,
          scores['EMA Trend'] || 0,
          scores['Bollinger'] || 0,
          scores['Patterns'] || 0,
          scores['OTE'] || 0,
          s.rsi || 50,
          s.macd || 0,
          s.isRange ? 1 : 0,
          s.adx || 25,
        ];
        features.push(f);
        labels.push(s.tradeResult === 'win' ? 1 : 0);
      });

      const means = Array(features[0].length).fill(0);
      const stds = Array(features[0].length).fill(0);
      features.forEach(f => f.forEach((v,i) => { means[i] += v; }));
      means.forEach((m,i) => means[i] = m / features.length);
      features.forEach(f => f.forEach((v,i) => { stds[i] += (v - means[i]) ** 2; }));
      stds.forEach((s,i) => stds[i] = Math.sqrt(s / features.length) || 1);

      const normalized = features.map(f => f.map((v,i) => (v - means[i]) / (stds[i] || 1)));

      const lr = 0.01;
      const epochs = 1000;
      let weights = new Array(normalized[0].length).fill(0);
      let bias = 0;
      for (let epoch = 0; epoch < epochs; epoch++) {
        let gradW = new Array(weights.length).fill(0);
        let gradB = 0;
        for (let i = 0; i < normalized.length; i++) {
          const z = normalized[i].reduce((sum, v, j) => sum + v * weights[j], 0) + bias;
          const pred = 1 / (1 + Math.exp(-z));
          const error = pred - labels[i];
          for (let j = 0; j < weights.length; j++) {
            gradW[j] += error * normalized[i][j];
          }
          gradB += error;
        }
        for (let j = 0; j < weights.length; j++) {
          weights[j] -= lr * gradW[j] / normalized.length;
        }
        bias -= lr * gradB / normalized.length;
      }

      const model = { weights, bias, means, stds };
      saveMLModel(model);
      return model;
    }

    function predictML(model, scoresMap, rsi, macd, isRange, adx) {
      if (!model) return null;
      const f = [
        scoresMap['BOS'] || 0,
        scoresMap['CHoCH'] || 0,
        scoresMap['Zone P/D'] || 0,
        scoresMap['Sweep Liq.'] || 0,
        scoresMap['Order Block'] || 0,
        scoresMap['FVG'] || 0,
        scoresMap['RSI'] || 0,
        scoresMap['MACD'] || 0,
        scoresMap['EMA Trend'] || 0,
        scoresMap['Bollinger'] || 0,
        scoresMap['Patterns'] || 0,
        scoresMap['OTE'] || 0,
        rsi || 50,
        macd || 0,
        isRange ? 1 : 0,
        adx || 25,
      ];
      const norm = f.map((v,i) => (v - model.means[i]) / (model.stds[i] || 1));
      const z = norm.reduce((sum, v, i) => sum + v * model.weights[i], 0) + model.bias;
      return 1 / (1 + Math.exp(-z));
    }

    function exchangeConvergence(candles) {
      const last = candles[candles.length-1].close;
      const spreads = [0, (Math.random() - 0.5) * 0.001 * last, (Math.random() - 0.5) * 0.002 * last];
      const prices = spreads.map(s => last + s);
      const avg = prices.reduce((a,b) => a+b, 0) / prices.length;
      const dispersion = Math.max(...prices) - Math.min(...prices);
      const score = Math.max(0, 100 - dispersion / (last * 0.002) * 50);
      return { prices, avg, dispersion, score: Math.min(100, score) };
    }

    // ---- SMC AVANCÉ ----
    function findSwings(candles, lookback = 2) {
      const swingHighs = [], swingLows = [];
      for (let i = lookback; i < candles.length - lookback; i++) {
        const c = candles[i];
        let isHigh = true, isLow = true;
        for (let k = 1; k <= lookback; k++) {
          if (candles[i-k].high >= c.high || candles[i+k].high >= c.high) isHigh = false;
          if (candles[i-k].low <= c.low || candles[i+k].low <= c.low) isLow = false;
        }
        if (isHigh) swingHighs.push({ idx: i, price: c.high });
        if (isLow) swingLows.push({ idx: i, price: c.low });
      }
      return { swingHighs, swingLows };
    }

    function analyzeSMC(pair, rawCandles, tfConfig, higherTimeframes) {
      if (!pair || !rawCandles || rawCandles.length < 16) return null;
      const candles = rawCandles.slice(0, -1);
      if (candles.length < 15) return null;
      const liveCandle = rawCandles[rawCandles.length - 1];
      const n = candles.length;
      const closes = candles.map(c => c.close);
      const highs = candles.map(c => c.high);
      const lows = candles.map(c => c.low);
      const last = candles[n-1];
      const isCrypto = pair.type === 'crypto';

      let dailyBias = 'Neutre', weeklyBias = 'Neutre';
      if (higherTimeframes) {
        if (higherTimeframes.daily && higherTimeframes.daily.ema200) {
          const dailyClose = higherTimeframes.daily.lastClose;
          dailyBias = dailyClose > higherTimeframes.daily.ema200 ? 'Haussier' : 'Baissier';
        }
        if (higherTimeframes.weekly && higherTimeframes.weekly.ema200) {
          const weeklyClose = higherTimeframes.weekly.lastClose;
          weeklyBias = weeklyClose > higherTimeframes.weekly.ema200 ? 'Haussier' : 'Baissier';
        }
      }

      const rHigh = Math.max(...highs.slice(-30));
      const rLow = Math.min(...lows.slice(-30));
      const range = rHigh - rLow || pair.pip;
      const eq = (rHigh + rLow) / 2;
      const pos = (liveCandle.close - rLow) / range;
      const zone = pos > 0.5 ? "Premium" : "Discount";

      const avg = arr => arr.reduce((a,b)=>a+b,0)/arr.length;
      const h = Math.floor(Math.min(n,20)/2);
      const older = avg(closes.slice(Math.max(0,n-h*2), Math.max(0,n-h)));
      const newer = avg(closes.slice(Math.max(0,n-h), n));
      const fallbackStructure = newer >= older ? "Haussier" : "Baissier";

      const { swingHighs, swingLows } = findSwings(candles, 2);
      let structure = fallbackStructure;
      if (swingHighs.length >= 2 && swingLows.length >= 2) {
        const hh = swingHighs[swingHighs.length-1].price > swingHighs[swingHighs.length-2].price;
        const hl = swingLows[swingLows.length-1].price > swingLows[swingLows.length-2].price;
        const lh = swingHighs[swingHighs.length-1].price < swingHighs[swingHighs.length-2].price;
        const ll = swingLows[swingLows.length-1].price < swingLows[swingLows.length-2].price;
        if (hh && hl) structure = "Haussier";
        else if (lh && ll) structure = "Baissier";
      }

      const rangeMultiplier = isCrypto ? 0.05 : 0.015;
      const minStrength = isCrypto ? 0.03 : 0.015;
      const pH = Math.max(...highs.slice(Math.max(0,n-30), -3));
      const pL = Math.min(...lows.slice(Math.max(0,n-30), -3));
      let bos = null, bosStrength = 0;
      if (last.close > pH + range * rangeMultiplier) { bos = "haussier"; bosStrength = (last.close - pH) / range; }
      else if (last.close < pL - range * rangeMultiplier) { bos = "baissier"; bosStrength = (pL - last.close) / range; }
      if (bos && bosStrength < minStrength) bos = null;

      let choch = null, chochStrength = 0;
      if (structure === "Haussier" && swingLows.length >= 1) {
        const lastSwingLow = swingLows[swingLows.length - 1];
        for (let i2 = lastSwingLow.idx + 1; i2 < n; i2++) {
          if (candles[i2].close < lastSwingLow.price - range * rangeMultiplier) {
            choch = "baissier"; chochStrength = (lastSwingLow.price - candles[i2].close) / range; break;
          }
        }
      } else if (structure === "Baissier" && swingHighs.length >= 1) {
        const lastSwingHigh = swingHighs[swingHighs.length - 1];
        for (let i2 = lastSwingHigh.idx + 1; i2 < n; i2++) {
          if (candles[i2].close > lastSwingHigh.price + range * rangeMultiplier) {
            choch = "haussier"; chochStrength = (candles[i2].close - lastSwingHigh.price) / range; break;
          }
        }
      }
      if (choch && chochStrength < minStrength) choch = null;

      let fvgs = [];
      const lookback = Math.min(n,20);
      const thresholdScale = isCrypto ? 1.5 : 1.0;
      for (let i3=Math.max(0,n-lookback); i3<n-2; i3++) {
        const c1=candles[i3], c3=candles[i3+2];
        if (!c1 || !c3) continue;
        if (c1.high < c3.low) {
          const top=c3.low, bottom=c1.high, mid=(top+bottom)/2, size=top-bottom;
          if (size < pair.pip * 0.5 * thresholdScale) continue;
          let fill=0; const priceNow=liveCandle.close;
          if (priceNow>=bottom && priceNow<=top) fill=(priceNow-bottom)/size;
          else if (priceNow>top) fill=1;
          const mitigated=priceNow>=bottom;
          fvgs.push({type:"bull", top,bottom,mid,size,fill,mitigated, idx:i3});
        } else if (c1.low > c3.high) {
          const top=c1.low, bottom=c3.high, mid=(top+bottom)/2, size=top-bottom;
          if (size < pair.pip * 0.5 * thresholdScale) continue;
          let fill=0; const priceNow=liveCandle.close;
          if (priceNow>=bottom && priceNow<=top) fill=(priceNow-bottom)/size;
          else if (priceNow<bottom) fill=1;
          const mitigated=priceNow<=top;
          fvgs.push({type:"bear", top,bottom,mid,size,fill,mitigated, idx:i3});
        }
      }
      fvgs = fvgs.filter(f => f.fill < 0.85);
      fvgs.sort((a,b) => Math.abs(a.mid - liveCandle.close) - Math.abs(b.mid - liveCandle.close));

      function findOBs(dir) {
        const found = [];
        const lookback2 = Math.min(n,20);
        for (let i4=n-2; i4>Math.max(2,n-lookback2); i4--) {
          const c = candles[i4];
          const push = candles.slice(i4+1, i4+4);
          if (push.length < 2) continue;
          const mv = push[push.length-1].close - push[0].open;
          const rangeCheck = Math.abs(mv) > range * 0.08 * thresholdScale;
          if (!rangeCheck) continue;
          let obScore = 0;
          if (rangeCheck) obScore += 2;
          if (i4 > 5) {
            const prevHigh = Math.max(...highs.slice(Math.max(0,i4-10), i4));
            const prevLow = Math.min(...lows.slice(Math.max(0,i4-10), i4));
            if (dir==="bull" && c.low < prevLow && c.close > prevLow) { obScore += 3; }
            if (dir==="bear" && c.high > prevHigh && c.close < prevHigh) { obScore += 3; }
          }
          for (let i5=Math.max(0,i4-5); i5<i4; i5++) {
            if (dir==="bull" && candles[i5].high > rHigh && candles[i5].close < rHigh) { obScore += 4; }
            if (dir==="bear" && candles[i5].low < rLow && candles[i5].close > rLow) { obScore += 4; }
          }
          const dirOk = (dir==="bull" && c.close < c.open && mv > 0) || (dir==="bear" && c.close > c.open && mv < 0);
          if (dirOk) obScore += 2;
          if (obScore >= 5) {
            found.push({
              low: c.low, high: c.high, mid: (c.low+c.high)/2,
              type: dir, displacement: mv, bos: false, sweep: false,
              score: obScore,
              mitigated: liveCandle.close >= c.low && liveCandle.close <= c.high
            });
          }
        }
        found.sort((a,b) => {
          if (a.mitigated !== b.mitigated) return a.mitigated ? 1 : -1;
          if (b.score !== a.score) return b.score - a.score;
          return Math.abs(a.mid - liveCandle.close) - Math.abs(b.mid - liveCandle.close);
        });
        return found.slice(0,5);
      }
      const obsBull = findOBs("bull");
      const obsBear = findOBs("bear");

      let sweep = null, sweepType = null;
      for (let i6=0; i6<candles.length-1; i6++) {
        const c = candles[i6];
        if (c.high > rHigh && c.close < rHigh) { sweep = "BSL"; sweepType = "haussier"; }
        if (c.low < rLow && c.close > rLow) { sweep = "SSL"; sweepType = "baissier"; }
      }

      let volAvg = 0;
      if (candles.length > 20) {
        let sumRange = 0;
        for (let i7=candles.length-20; i7<candles.length; i7++) sumRange += (candles[i7].high - candles[i7].low);
        volAvg = sumRange / 20;
      }
      const currentRange = liveCandle.high - liveCandle.low;
      const relativeVolume = volAvg > 0 ? currentRange / volAvg : 1;

      return {
        last, livePrice: liveCandle.close, rHigh, rLow, eq, zone, pos, range, structure, bos, bosStrength, choch, chochStrength,
        fvgs, obsBull, obsBear, sweep, sweepType,
        obBull: obsBull[0] || null, obBear: obsBear[0] || null,
        fvgCount: fvgs.length, relativeVolume, dailyBias, weeklyBias,
        isCrypto
      };
    }

    // ---- MONTE CARLO ----
    function monteCarloValidation(scoreItems, marketConditions, nSims = 500) {
      let wins = 0;
      for (let i = 0; i < nSims; i++) {
        let totalScore = 0, maxScore = 0;
        scoreItems.forEach(item => {
          const noise = (Math.random() - 0.5) * 0.2 * item.max;
          const effective = item.ok ? item.pts : Math.random() * item.max * 0.5;
          totalScore += effective + noise;
          maxScore += item.max;
        });
        const scoreRatio = maxScore > 0 ? totalScore / maxScore : 0.5;
        const marketFactor = 1 + (marketConditions.volatility - 0.5) * 0.3 + (marketConditions.momentum - 0.5) * 0.2;
        const prob = 1 / (1 + Math.exp(-5 * (scoreRatio - 0.4 + Math.random() * 0.05)));
        if (Math.random() < prob) wins++;
      }
      return wins / nSims;
    }

    // ---- FULL ANALYSIS (avec SCS) ----
    function fullAnalysis(pair, candles, tfConfig, kz, customWeights, journal, higherData = {}, useLearning = true) {
      if (!pair || !tfConfig) return null;

      const smc = analyzeSMC(pair, candles, tfConfig, higherData);
      if (!smc) return null;

      const closes = candles.map(c => c.close);
      const highs = candles.map(c => c.high);
      const lows = candles.map(c => c.low);
      const n = candles.length;

      const rsiVals = n > 15 ? calcRSI(closes) : [];
      const rsiCur = rsiVals.length ? rsiVals[rsiVals.length-1] : 50;
      const macdData = n > 30 ? calcMACD(closes) : { histogram: [0] };
      const macdHist = macdData.histogram[macdData.histogram.length-1] || 0;
      const bb = n > 20 ? calcBB(closes) : [];
      const bbCur = bb.length ? bb[bb.length-1] : null;
      const atrCur = calcATR(candles, tfConfig.atrP);
      const ichi = calcIchimoku(highs, lows);
      const pivots = calcPivots(highs, lows);
      const patterns = detectPatterns(candles);
      const divergences = detectDivergence(closes, rsiVals);

      const ema20 = calcEMA(closes, Math.min(20,n));
      const ema50 = calcEMA(closes, Math.min(50,n));
      const ema200 = calcEMA(closes, Math.min(200,n));
      const emaTrend = ema20[ema20.length-1] > ema50[ema50.length-1] ? "Haussier" : "Baissier";
      const majorTrend = ema200.length && closes[closes.length-1] > ema200[ema200.length-1] ? "Haussier" : "Baissier";

      const roc = n >= 5 ? (closes[n-1] - closes[n-5]) / closes[n-5] * 100 : 0;
      const momentum = roc > 0.05 ? "Haussier" : roc < -0.05 ? "Baissier" : "Neutre";
      const cumDelta = closes.slice(1).reduce((s,c,i) => s + (c - closes[i]), 0);

      const manipulation = detectManipulation(candles, smc.structure);
      const volumeProfile = calcVolumeProfile(candles);
      const cascade = cascadeConfluence(higherData, smc.structure);
      const liquidity = cryptoLiquidityFilter(pair);
      const exchange = exchangeConvergence(candles);

      const defaultWeights = {
        bos: 30, choch: 25, zone: 12, sweep: 20, ob: 18, fvg: 18,
        rsi: 5, macd: 5, trend: 8, bb: 6, pattern: 6, ote: 10,
        manipulation: 15, volume: 10, cascade: 15, liquidity: 10, exchange: 10
      };
      let finalWeights = { ...defaultWeights };
      if (useLearning) {
        const learned = getLearnedWeights();
        if (learned) {
          Object.keys(learned).forEach(k => {
            if (defaultWeights[k] !== undefined) {
              finalWeights[k] = Math.round(0.7 * learned[k] + 0.3 * defaultWeights[k]);
            }
          });
        }
      }
      let w = {};
      for (let k in finalWeights) {
        w[k] = (customWeights && customWeights[k] !== undefined) ? customWeights[k] : finalWeights[k];
      }

      let scoreItems = [];
      const bosOk = smc.bos === (smc.structure === "Haussier" ? "haussier" : "baissier") && smc.bosStrength > 0.005;
      scoreItems.push({ label: "BOS", ok: bosOk, detail: smc.bos || "Dans range", pts: bosOk ? w.bos : 0, max: w.bos, cat: "SMC" });
      const chochOk = !!smc.choch && smc.chochStrength > 0.005;
      scoreItems.push({ label: "CHoCH", ok: chochOk, detail: smc.choch ? "CHoCH "+smc.choch : "—", pts: chochOk ? w.choch : 0, max: w.choch, cat: "SMC" });
      const zOk = (smc.structure === "Haussier" && smc.zone === "Discount") || (smc.structure === "Baissier" && smc.zone === "Premium");
      scoreItems.push({ label: "Zone P/D", ok: zOk, detail: smc.zone, pts: zOk ? w.zone : Math.round(w.zone*0.3), max: w.zone, cat: "SMC" });
      const sweepOk = !!smc.sweep && smc.sweepType === smc.structure.toLowerCase();
      scoreItems.push({ label: "Sweep Liq.", ok: sweepOk, detail: smc.sweep || "Aucun", pts: sweepOk ? w.sweep : 0, max: w.sweep, cat: "SMC" });
      const obOk = smc.structure === "Haussier" ? (smc.obBull && smc.obBull.score >= 5) : (smc.obBear && smc.obBear.score >= 5);
      scoreItems.push({ label: "Order Block", ok: obOk, detail: (smc.obsBull.length + smc.obsBear.length) + " OB", pts: obOk ? w.ob : 0, max: w.ob, cat: "SMC" });
      const fvgOk = smc.fvgCount > 0 && smc.fvgs.some(f => f.type === (smc.structure === "Haussier" ? "bull" : "bear"));
      scoreItems.push({ label: "FVG", ok: fvgOk, detail: smc.fvgCount + " FVG", pts: fvgOk ? w.fvg : 0, max: w.fvg, cat: "SMC" });
      const rsiOk = (smc.structure === "Haussier" && rsiCur < 50) || (smc.structure === "Baissier" && rsiCur > 50);
      scoreItems.push({ label: "RSI", ok: rsiOk, detail: rsiCur.toFixed(1), pts: rsiOk ? w.rsi : 0, max: w.rsi, cat: "Indicateur" });
      const macdOk = (smc.structure === "Haussier" && macdHist > 0) || (smc.structure === "Baissier" && macdHist < 0);
      scoreItems.push({ label: "MACD", ok: macdOk, detail: macdHist > 0 ? "Haussier" : "Baissier", pts: macdOk ? w.macd : 0, max: w.macd, cat: "Indicateur" });
      const trendOk = emaTrend === smc.structure;
      scoreItems.push({ label: "EMA Trend", ok: trendOk, detail: emaTrend, pts: trendOk ? w.trend : 0, max: w.trend, cat: "Indicateur" });
      const bbOk = bbCur && ((smc.structure === "Haussier" && smc.livePrice < bbCur.lower) || (smc.structure === "Baissier" && smc.livePrice > bbCur.upper));
      scoreItems.push({ label: "Bollinger", ok: !!bbOk, detail: bbCur ? "Mid: " + bbCur.middle.toFixed(pair.digits) : "—", pts: bbOk ? w.bb : 0, max: w.bb, cat: "Indicateur" });
      const patOk = patterns.length > 0;
      scoreItems.push({ label: "Patterns", ok: patOk, detail: patterns.map(p => p.icon).join(" ") || "—", pts: patOk ? w.pattern : 0, max: w.pattern, cat: "Pattern" });
      const rangeHigh = smc.rHigh, rangeLow = smc.rLow, rangeSize = rangeHigh - rangeLow;
      const fibo618 = rangeLow + rangeSize * 0.618;
      const oteLow = rangeLow + rangeSize * 0.62;
      const oteHigh = rangeLow + rangeSize * 0.79;
      const price = smc.livePrice;
      const inOTE = price >= oteLow && price <= oteHigh;
      scoreItems.push({ label: "OTE", ok: inOTE, detail: "FIBO 61.8%: " + fibo618.toFixed(pair.digits), pts: inOTE ? w.ote : 0, max: w.ote, cat: "SMC" });

      const manipOk = !manipulation.fakeBos && manipulation.score > 70;
      scoreItems.push({ label: "Manipulation", ok: manipOk, detail: manipulation.fakeBos ? "Fake BOS" : (manipulation.inducement ? "Inducement" : "Aucune"), pts: manipOk ? w.manipulation : 0, max: w.manipulation, cat: "Robustesse" });
      const volOk = volumeProfile.score > 50;
      scoreItems.push({ label: "Volume", ok: volOk, detail: "POC: " + (volumeProfile.poc ? volumeProfile.poc.toFixed(pair.digits) : "N/A") + " | Delta: " + volumeProfile.delta, pts: volOk ? w.volume : 0, max: w.volume, cat: "Volume" });
      const cascadeOk = cascade.score > 60;
      scoreItems.push({ label: "Cascade TF", ok: cascadeOk, detail: cascade.score + "% aligné", pts: cascadeOk ? w.cascade : 0, max: w.cascade, cat: "Confluence" });
      const liqOk = liquidity.penalty < 15;
      scoreItems.push({ label: "Liquidité", ok: liqOk, detail: liquidity.reason, pts: liqOk ? w.liquidity : 0, max: w.liquidity, cat: "Marché" });
      const exchOk = exchange.score > 60;
      scoreItems.push({ label: "Multi-Ex", ok: exchOk, detail: "Convergence " + exchange.score.toFixed(0) + "%", pts: exchOk ? w.exchange : 0, max: w.exchange, cat: "Robustesse" });

      let trendPenalty = 0;
      let trendWarn = "", dailyWarn = "", weeklyWarn = "";
      if (smc.dailyBias !== "Neutre" && smc.dailyBias !== smc.structure) { trendPenalty -= 8; dailyWarn = "Contre Daily (" + smc.dailyBias + ")"; }
      if (smc.weeklyBias !== "Neutre" && smc.weeklyBias !== smc.structure) { trendPenalty -= 12; weeklyWarn = "Contre Weekly (" + smc.weeklyBias + ")"; }
      if (majorTrend === "Haussier" && smc.structure === "Baissier") { trendPenalty -= 10; trendWarn = "Contre EMA200"; }
      else if (majorTrend === "Baissier" && smc.structure === "Haussier") { trendPenalty -= 10; trendWarn = "Contre EMA200"; }
      if (smc.relativeVolume < 0.6) trendPenalty -= 5;
      if (liquidity.penalty > 0) trendPenalty -= liquidity.penalty * 0.5;

      let scsScore = 0;
      const scsDetails = [];

      let bosStrength = 0;
      if (smc.bos && smc.bosStrength > 0) {
        const displacement = smc.bosStrength * smc.range;
        const atr = atrCur || 0.001;
        bosStrength = displacement / atr;
        const scsBos = bosStrength >= 1.2 ? 10 : (bosStrength >= 0.8 ? 5 : 0);
        scsScore += scsBos;
        scsDetails.push({ label: "BOS strength", value: bosStrength.toFixed(2) + " ATR", pts: scsBos });
      }

      let chochStrength = smc.chochStrength || 0;
      const scsChoch = chochStrength >= 0.025 ? 10 : (chochStrength >= 0.015 ? 5 : 0);
      scsScore += scsChoch;
      scsDetails.push({ label: "CHoCH force", value: (chochStrength*100).toFixed(1)+"%", pts: scsChoch });

      const ob = smc.structure === "Haussier" ? smc.obBull : smc.obBear;
      const obScore = ob ? ob.score : 0;
      const obMitigated = ob ? ob.mitigated : false;
      const scsOb = (obScore >= 6 && !obMitigated) ? 8 : (obScore >= 4 ? 4 : 0);
      scsScore += scsOb;
      scsDetails.push({ label: "OB quality", value: obScore + "/10" + (obMitigated ? " ⚠️mitigé" : ""), pts: scsOb });

      const fvgsGood = smc.fvgs.filter(f => f.size >= 0.7 * atrCur && f.fill < 0.6);
      const scsFvg = fvgsGood.length > 0 ? 8 : (smc.fvgCount > 0 ? 3 : 0);
      scsScore += scsFvg;
      scsDetails.push({ label: "FVG quality", value: fvgsGood.length + " valides / " + smc.fvgCount, pts: scsFvg });

      let tfCount = 0;
      ['h4','h1','m15','m5'].forEach(tf => {
        if (higherData[tf] && higherData[tf].structure === smc.structure) tfCount++;
      });
      const scsTf = tfCount >= 3 ? 10 : (tfCount >= 2 ? 6 : (tfCount >= 1 ? 3 : 0));
      scsScore += scsTf;
      scsDetails.push({ label: "Multi‑TF alignées", value: tfCount + " / 4", pts: scsTf });

      let biasBonus = 0;
      if (smc.dailyBias === smc.structure) biasBonus += 6;
      if (smc.weeklyBias === smc.structure) biasBonus += 6;
      scsScore += biasBonus;
      scsDetails.push({ label: "Bias Daily/Weekly", value: (smc.dailyBias + "/" + smc.weeklyBias), pts: biasBonus });

      let kzBonus = 0;
      if (pair.type === 'fx' && kz && ['1h','15min','5min'].includes(tfConfig.id)) {
        kzBonus = 6;
      } else if (pair.type === 'fx' && !kz && ['1h','15min','5min'].includes(tfConfig.id)) {
        kzBonus = -3;
      }
      scsScore += kzBonus;
      scsDetails.push({ label: "Killzone", value: kz ? (kz.label + " active") : "inactive", pts: kzBonus });

      let scsMax = 10+10+8+8+10+12+6;
      let scsAdjusted = Math.min(100, Math.round((scsScore / scsMax) * 100));
      const scsDelta = (scsAdjusted - 50) / 5;
      const probDelta = (scsAdjusted - 50) / 100 * 0.08;

      let scoreTotal = Math.min(100, Math.max(0, scoreItems.reduce((s,i) => s+i.pts, 0) + trendPenalty + scsDelta));

      const marketConditions = {
        volatility: atrCur / (smc.range || pair.pip),
        momentum: momentum === "Haussier" ? 0.7 : momentum === "Baissier" ? 0.3 : 0.5,
        isRange: false
      };
      const mcProb = monteCarloValidation(scoreItems, marketConditions, 200);

      const scoresMap = {};
      scoreItems.forEach(item => { scoresMap[item.label] = item.pts; });
      const model = getMLModel();
      let mlProb = null;
      if (model) {
        mlProb = predictML(model, scoresMap, rsiCur, macdHist, false, 25);
      }

      let probBayes = 0.54;
      if (scoreTotal >= 80) probBayes += 0.16;
      else if (scoreTotal >= 60) probBayes += 0.10;
      else if (scoreTotal < 40) probBayes -= 0.15;
      if (kz) probBayes += 0.06;
      if (sweepOk) probBayes += 0.06;
      if (chochOk) probBayes += 0.06;
      if (divergences.length) probBayes += 0.05;
      if (rsiCur < 30 || rsiCur > 70) probBayes += 0.05;
      if (zOk) probBayes += 0.05; else probBayes -= 0.05;
      if (momentum === smc.structure) probBayes += 0.05;
      else if (momentum !== "Neutre") probBayes -= 0.05;
      const tfBonus = { M1: -0.05, M5: 0, M15: 0.02, H1: 0.04, H4: 0.06, D1: 0.08, W1: 0.10 };
      probBayes += tfBonus[tfConfig.label] || 0;
      if (trendPenalty < 0) probBayes -= 0.10;
      probBayes += probDelta;
      probBayes = Math.min(0.94, Math.max(0.15, probBayes));

      let finalProb = probBayes;
      if (mcProb !== null) finalProb = 0.8 * finalProb + 0.2 * mcProb;
      if (mlProb !== null && mlProb > 0) finalProb = 0.7 * finalProb + 0.3 * mlProb;
      finalProb = Math.min(0.94, Math.max(0.15, finalProb));

      const dynamicRisk = dynamicRiskManagement(scoreTotal, finalProb, manipulation.score, volumeProfile.score, cascade.score);

      const dir = (smc.choch === "haussier" || (smc.structure === "Haussier" && !smc.choch)) ? "BUY" : "SELL";

      const counterTrend = (dir === "BUY" && majorTrend === "Baissier") || (dir === "SELL" && majorTrend === "Haussier");
      const noHigherTFSupport = cascade.score < 50;
      const chochConfirmed = chochOk && smc.chochStrength >= 0.025;
      const counterTrendVeto = counterTrend && noHigherTFSupport && !chochConfirmed;

      if (scoreTotal < 60 || counterTrendVeto) {
        return {
          smc, scoreItems, scoreTotal,
          prob: finalProb,
          dir: "PAS DE TRADE",
          strength: "FAIBLE",
          sigColor: "#6e7681",
          plan: null,
          zones: [], patterns, divergences,
          rsi: rsiCur, macdHist, bbCur, atrCur, ichi,
          resLevels: [], supLevels: [],
          momentum, cumDelta,
          emaTrend, majorTrend,
          trendWarn: counterTrendVeto ? ("Contre-tendance EMA200 ("+dir+" vs "+majorTrend+") sans confluence TF ni CHoCH fort") : ("Score trop faible ("+scoreTotal+"/100)"),
          dailyBias: smc.dailyBias, weeklyBias: smc.weeklyBias,
          live: smc.livePrice,
          ev: "0.00",
          h1BiasText: "Pas de signal",
          chochText: "Aucun",
          action: counterTrendVeto ? "Attendre confluence multi-TF" : "Attendre > 60",
          relativeVolume: smc.relativeVolume,
          inOTE, fibo618, dailyWarn, weeklyWarn,
          scoresMap,
          entryPrice: null, slPrice: null, tp1Price: null, tp2Price: null, tp3Price: null,
          bePrice: null, trailingStart: null,
          quality: "Pas de trade",
          confidenceDetails: "",
          mlProb, mcProb, finalProb,
          isCrypto: pair.type === 'crypto',
          manipulation, volumeProfile, cascade, liquidity, exchange,
          dynamicRisk,
          scs: { score: scsAdjusted, details: scsDetails }
        };
      }

      let plan = null;
      const planDir = dir === "BUY" ? "bull" : "bear";
      const obFiltered = planDir === "bull" ? smc.obsBull.find(o => o.score >= 6 && !o.mitigated) : smc.obsBear.find(o => o.score >= 6 && !o.mitigated);
      const fvgFiltered = smc.fvgs.find(f => f.type === planDir && f.size >= 0.7 * atrCur && f.fill < 0.6);

      const entryOB = obFiltered ? (planDir === "bull" ? obFiltered.high : obFiltered.low) : null;
      const entryFVG = fvgFiltered ? fvgFiltered.mid : null;
      const entryMain = (entryOB && entryFVG) ? (planDir === "bull" ? Math.max(entryOB, entryFVG) : Math.min(entryOB, entryFVG)) :
                        (entryOB || entryFVG);
      if (entryMain) {
        const risk = atrCur * 2.5;
        const sl = planDir === "bull" ? entryMain - risk : entryMain + risk;
        const tp1 = planDir === "bull" ? entryMain + risk : entryMain - risk;
        const tp2 = planDir === "bull" ? entryMain + risk*2 : entryMain - risk*2;
        const tp3 = planDir === "bull" ? entryMain + risk*3 : entryMain - risk*3;
        const be = entryMain + (planDir === "bull" ? risk*0.3 : -risk*0.3);
        const trailingStart = planDir === "bull" ? entryMain + risk*0.5 : entryMain - risk*0.5;
        plan = { entryA: entryMain, sl, tp1, tp2, tp3, be, trailingStart, dir: planDir };
      }

      const strength = scoreTotal >= 75 ? "FORT" : scoreTotal >= 50 ? "MOYEN" : "FAIBLE";
      const sigColor = scoreTotal >= 75 ? "#22c55e" : scoreTotal >= 50 ? "#eab308" : "#ef4444";
      let quality = "Faible";
      if (scoreTotal >= 75 && finalProb >= 0.7 && manipulation.score > 70) quality = "Excellent";
      else if (scoreTotal >= 60 && finalProb >= 0.55 && manipulation.score > 60) quality = "Attendre confirmation";
      if (scsAdjusted < 50 && quality === "Excellent") quality = "Attendre confirmation";

      const price2 = smc.livePrice;
      const div = pair.type === "idx" ? 1 : pair.pip;
      const toPts = (v) => (v - price2) / div;
      let zones = [];
      smc.obsBull.forEach(o => zones.push({ kind: "OB", dir: "bull", label: "OB Bullish", value: o.low, pts: toPts(o.low) }));
      smc.obsBear.forEach(o => zones.push({ kind: "OB", dir: "bear", label: "OB Bearish", value: o.high, pts: toPts(o.high) }));
      smc.fvgs.forEach(f => zones.push({ kind: "FVG", dir: f.type, label: "FVG", value: f.mid, pts: toPts(f.mid), arrow: f.type === "bull" ? "↑" : "↓" }));
      pivots.res.forEach(r => zones.push({ kind: "RES", dir: "bear", label: "Resistance", value: r, pts: toPts(r) }));
      pivots.sup.forEach(s => zones.push({ kind: "SUP", dir: "bull", label: "Support", value: s, pts: toPts(s) }));
      zones.sort((a,b) => Math.abs(a.pts) - Math.abs(b.pts));

      const ev = (finalProb * 2 - (1 - finalProb) * 1).toFixed(2);
      const confidenceDetails = scoreItems.filter(it => it.ok).map(it => it.label).join(' · ');

      return {
        smc, scoreItems, scoreTotal,
        prob: finalProb,
        dir, strength, sigColor, plan, zones,
        patterns, divergences, rsi: rsiCur, macdHist, bbCur, atrCur, ichi,
        resLevels: pivots.res, supLevels: pivots.sup,
        momentum, cumDelta, emaTrend, majorTrend,
        trendWarn, dailyBias: smc.dailyBias, weeklyBias: smc.weeklyBias,
        live: smc.livePrice, ev,
        h1BiasText: smc.structure + (smc.bos ? " (BOS " + smc.bos + ")" : ""),
        chochText: smc.choch ? "CHoCH " + (smc.choch === "haussier" ? "Bullish" : "Bearish") : "Pas de CHoCH",
        action: dir === "BUY" ? "Retour OB/FVG bullish → BUY" : "Retour OB/FVG bearish → SELL",
        relativeVolume: smc.relativeVolume, inOTE, fibo618, dailyWarn, weeklyWarn,
        scoresMap,
        entryPrice: plan ? plan.entryA : null,
        slPrice: plan ? plan.sl : null,
        tp1Price: plan ? plan.tp1 : null,
        tp2Price: plan ? plan.tp2 : null,
        tp3Price: plan ? plan.tp3 : null,
        bePrice: plan ? plan.be : null,
        trailingStart: plan ? plan.trailingStart : null,
        quality,
        confidenceDetails,
        mlProb, mcProb, finalProb,
        isCrypto: pair.type === 'crypto',
        manipulation, volumeProfile, cascade, liquidity, exchange,
        dynamicRisk,
        scs: { score: scsAdjusted, details: scsDetails }
      };
    }

    // ---- COMPOSANTS UI ----
    function SecTitle(props) {
      return React.createElement("div", {
        style: { fontSize: "10px", color: "#6e7681", marginBottom: "8px", marginTop: "4px", textTransform: "uppercase",
          letterSpacing: ".08em", display: "flex", alignItems: "center", gap: "8px" }
      }, props.children, React.createElement("span", { style: { flex: 1, height: "1px", background: "#1f2937" } }));
    }
    function Card(props) {
      const baseStyle = { background: "rgba(22,27,34,.85)", border: "1px solid #1f2937", borderRadius: "12px", padding: "12px 14px", marginBottom: "10px" };
      const merged = Object.assign({}, baseStyle, props.style || {});
      return React.createElement("div", { style: merged }, props.children);
    }
    function CheckItem(props) {
      const { label, ok, detail, pts, cat } = props;
      const color = ok ? "#22c55e" : "#ef4444";
      const bg = ok ? "rgba(34,197,94,.07)" : "rgba(239,68,68,.06)";
      return React.createElement("div", {
        style: { display: "flex", alignItems: "center", gap: "10px", padding: "9px 10px", borderRadius: "8px",
          border: "1px solid " + color + "44", background: bg, marginBottom: "6px" }
      },
        React.createElement("span", { style: { width: "20px", height: "20px", borderRadius: "5px", display: "flex",
          alignItems: "center", justifyContent: "center", fontSize: "12px", flexShrink: 0,
          background: color, color: "#0a0e17", fontWeight: 800 } }, ok ? "✓" : "✕"),
        React.createElement("div", { style: { flex: 1 } },
          React.createElement("div", { style: { display: "flex", justifyContent: "space-between" } },
            React.createElement("span", { style: { fontSize: "12px", fontWeight: 600 } }, label),

    // ---- BACKTEST RÉALISTE ----
    function runRealisticBacktest(apiKey, pairs, tfList, customWeights) {
      return new Promise(async (resolve) => {
        const results = [];
        let totalTrades = 0, wins = 0, losses = 0;
        let totalGain = 0, totalLoss = 0;
        const equityCurve = [];
        let equity = 0, peak = 0, maxDD = 0;
        let currentStreak = 0, streakType = null, maxWinStreak = 0, maxLossStreak = 0;
        const gains = [], lossesArr = [];
        const byPair = {}, byTF = {};
        const tradeResults = [];

        const COMMISSION_PER_LOT = 0.5;
        const SLIPPAGE_PIPS = 0.5;

        for (const p of pairs) {
          let spreadPips = 0.5;
          if (p.id === 'EURUSD') spreadPips = 0.3;
          else if (p.id === 'GBPUSD') spreadPips = 0.5;
          else if (p.id === 'AUDUSD') spreadPips = 0.4;
          else if (p.id === 'XAUUSD') spreadPips = 2;
          else if (p.id === 'US30') spreadPips = 1;
          else if (p.id === 'BTCUSD') spreadPips = 10;
          else if (p.id === 'ETHUSD') spreadPips = 5;
          else spreadPips = 1;

          for (const tf of tfList) {
            if (tf.id === '1week') continue;
            try {
              const key = p.symbol + '_' + tf.apiInterval + '_bt';
              let candles = getCache(key);
              if (!candles) {
                const url = API + '/time_series?symbol=' + encodeURIComponent(p.symbol) + '&interval=' + tf.apiInterval + '&outputsize=350&apikey=' + apiKey;
                const res = await fetch(url);
                if (res.status === 429) { await new Promise(r => setTimeout(r, 15000)); continue; }
                const data = await res.json();
                if (data.status === "error" || !data.values) continue;
                candles = data.values.map(v => ({
                  time: v.datetime,
                  open: parseFloat(v.open),
                  high: parseFloat(v.high),
                  low: parseFloat(v.low),
                  close: parseFloat(v.close),
                  volume: parseFloat(v.volume) || 0
                })).reverse();
                setCache(key, candles, 3600);
              }
              if (!candles || candles.length < 60) continue;

              let i = 50;
              while (i < candles.length - 20) {
                const slice = candles.slice(0, i);
                if (slice.length < 40) { i++; continue; }
                const kzNow = activeKZForPair(lomeMin(new Date(slice[slice.length-1].time)), p);
                const higherData = {};
                try {
                  const d1Key = p.symbol + '_1day_bt';
                  const d1 = getCache(d1Key);
                  if (d1 && d1.length > 20) {
                    const d1Closes = d1.map(c => c.close);
                    const ema200 = calcEMA(d1Closes, 200);
                    higherData.daily = { bias: d1Closes[d1Closes.length-1] > ema200[ema200.length-1] ? 'Haussier' : 'Baissier', lastClose: d1Closes[d1Closes.length-1], ema200: ema200[ema200.length-1] };
                  }
                } catch(e) {}

                const result = fullAnalysis(p, slice, tf, kzNow, customWeights, [], higherData, false);
                if (result && result.dir !== "PAS DE TRADE" && result.plan) {
                  const entry = result.plan.entryA;
                  const sl = result.plan.sl;
                  const tp1 = result.plan.tp1;
                  const tp2 = result.plan.tp2;
                  const tp3 = result.plan.tp3;
                  const slippage = (Math.random() - 0.5) * SLIPPAGE_PIPS * p.pip;
                  const entryWithSlippage = entry + slippage;
                  const lotSize = 1;
                  const commission = COMMISSION_PER_LOT * lotSize;

                  let closed = false, exitPrice = 0, tradeResult = 'loss', rMultiple = 0;
                  let netProfit = 0;
                  for (let j = i + 1; j < candles.length; j++) {
                    const c = candles[j];
                    const adjustedSL = result.dir === 'BUY' ? sl - spreadPips * p.pip : sl + spreadPips * p.pip;
                    const adjustedTP1 = result.dir === 'BUY' ? tp1 + spreadPips * p.pip : tp1 - spreadPips * p.pip;
                    const adjustedTP2 = result.dir === 'BUY' ? tp2 + spreadPips * p.pip : tp2 - spreadPips * p.pip;
                    const adjustedTP3 = result.dir === 'BUY' ? tp3 + spreadPips * p.pip : tp3 - spreadPips * p.pip;

                    if (result.dir === 'BUY') {
                      if (c.low <= adjustedSL) { exitPrice = adjustedSL; tradeResult = 'loss'; rMultiple = -1; closed = true; i = j; break; }
                      else if (c.high >= adjustedTP1 && c.high < adjustedTP2) { exitPrice = adjustedTP1; tradeResult = 'win'; rMultiple = 1; closed = true; i = j; break; }
                      else if (c.high >= adjustedTP2 && c.high < adjustedTP3) { exitPrice = adjustedTP2; tradeResult = 'win'; rMultiple = 2; closed = true; i = j; break; }
                      else if (c.high >= adjustedTP3) { exitPrice = adjustedTP3; tradeResult = 'win'; rMultiple = 3; closed = true; i = j; break; }
                    } else {
                      if (c.high >= adjustedSL) { exitPrice = adjustedSL; tradeResult = 'loss'; rMultiple = -1; closed = true; i = j; break; }
                      else if (c.low <= adjustedTP1 && c.low > adjustedTP2) { exitPrice = adjustedTP1; tradeResult = 'win'; rMultiple = 1; closed = true; i = j; break; }
                      else if (c.low <= adjustedTP2 && c.low > adjustedTP3) { exitPrice = adjustedTP2; tradeResult = 'win'; rMultiple = 2; closed = true; i = j; break; }
                      else if (c.low <= adjustedTP3) { exitPrice = adjustedTP3; tradeResult = 'win'; rMultiple = 3; closed = true; i = j; break; }
                    }
                  }
                  if (closed) {
                    const pipValue = p.pip || 0.0001;
                    const points = (exitPrice - entryWithSlippage) / pipValue;
                    const grossProfit = points * lotSize * (p.type === 'fx' ? 10 : 1);
                    netProfit = grossProfit - commission;
                    const riskAmount = Math.abs(entryWithSlippage - adjustedSL) / pipValue * lotSize * (p.type === 'fx' ? 10 : 1);
                    const rEffective = riskAmount > 0 ? netProfit / riskAmount : 0;

                    totalTrades++;
                    if (netProfit > 0) {
                      wins++;
                      totalGain += netProfit;
                      gains.push(netProfit);
                      if (streakType === 'win') currentStreak++; else { currentStreak = 1; streakType = 'win'; }
                      maxWinStreak = Math.max(maxWinStreak, currentStreak);
                    } else {
                      losses++;
                      totalLoss += Math.abs(netProfit);
                      lossesArr.push(Math.abs(netProfit));
                      if (streakType === 'loss') currentStreak++; else { currentStreak = 1; streakType = 'loss'; }
                      maxLossStreak = Math.max(maxLossStreak, currentStreak);
                    }
                    equity += netProfit;
                    if (equity > peak) peak = equity;
                    const dd = peak > 0 ? (peak - equity) / peak * 100 : 0;
                    if (dd > maxDD) maxDD = dd;
                    equityCurve.push({ index: equityCurve.length, equity, dd });

                    if (!byPair[p.label]) byPair[p.label] = { wins:0, losses:0, total:0 };
                    byPair[p.label].total++;
                    if (netProfit > 0) byPair[p.label].wins++; else byPair[p.label].losses++;

                    if (!byTF[tf.label]) byTF[tf.label] = { wins:0, losses:0, total:0 };
                    byTF[tf.label].total++;
                    if (netProfit > 0) byTF[tf.label].wins++; else byTF[tf.label].losses++;

                    tradeResults.push({ pair: p.label, tf: tf.label, dir: result.dir, entry: entryWithSlippage, exit: exitPrice, result: netProfit > 0 ? 'win' : 'loss', rMultiple: rEffective, score: result.scoreTotal, netProfit });
                  }
                }
                i++;
              }
            } catch(e) { console.warn('Backtest error:', e); }
          }
        }

        const winrate = totalTrades > 0 ? wins / totalTrades : 0;
        const profitFactor = totalLoss > 0 ? totalGain / totalLoss : 0;
        const avgGain = gains.length > 0 ? gains.reduce((a,b) => a+b, 0) / gains.length : 0;
        const avgLoss = lossesArr.length > 0 ? lossesArr.reduce((a,b) => a+b, 0) / lossesArr.length : 0;

        resolve({
          totalTrades, wins, losses, winrate, profitFactor,
          avgGain, avgLoss, maxDD, maxWinStreak, maxLossStreak,
          equityCurve, byPair, byTF, results: tradeResults
        });
      });
    }

          const last = cached.data[cached.data.length - 1];
          const high = last.high, low = last.low;

            if (low <= trade.slPrice) closeTradeById(trade.id, 'loss', trade.slPrice, -1);
