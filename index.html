<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0e17" />
    <title>Blackzeldon Scanner — Oscar v10.1</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda@3.0.1/eruda.min.js"></script>
    <script>eruda.init();</script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
        body{background:#0a0e17;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:#e6edf3;overscroll-behavior:none;padding:10px 12px 100px;max-width:500px;margin:0 auto;}
        .card{background:rgba(22,27,34,.85);border:1px solid #1f2937;border-radius:12px;padding:12px 14px;margin-bottom:10px;}
        .card h3{font-size:10px;color:#6e7681;text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px;display:flex;align-items:center;gap:8px;}
        .card h3 span{flex:1;height:1px;background:#1f2937;}
        .flex{display:flex;gap:8px;flex-wrap:wrap;}
        .stat{background:#0a0e17;border-radius:8px;padding:8px;text-align:center;flex:1;min-width:50px;}
        .stat .label{font-size:9px;color:#6e7681;}
        .stat .value{font-size:18px;font-weight:700;}
        .badge{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;}
        .badge-green{background:rgba(34,197,94,.15);color:#22c55e;}
        .badge-red{background:rgba(239,68,68,.15);color:#ef4444;}
        .badge-yellow{background:rgba(234,179,8,.15);color:#eab308;}
        .badge-gray{background:rgba(110,118,129,.15);color:#8b949e;}
        .btn{background:#58a6ff;color:#0a0e17;border:none;border-radius:6px;padding:8px 14px;font-weight:700;font-size:12px;cursor:pointer;width:100%;}
        .btn:disabled{opacity:0.5;}
        .loading{text-align:center;padding:30px;color:#6e7681;}
        .error{color:#ef4444;padding:12px;background:rgba(239,68,68,.1);border-radius:8px;}
        .row{display:flex;justify-content:space-between;padding:6px 0;font-size:11px;border-bottom:1px solid #1f2937;}
        .tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;}
        .tag-green{background:rgba(34,197,94,.15);color:#22c55e;}
        .tag-red{background:rgba(239,68,68,.15);color:#ef4444;}
        .tag-yellow{background:rgba(234,179,8,.15);color:#eab308;}
        .tag-gray{background:rgba(110,118,129,.15);color:#8b949e;}
        .mt-2{margin-top:6px;}
        .signal-card{border-left:4px solid;padding:10px;}
        .score-bar{height:4px;background:#1f2937;border-radius:3px;overflow:hidden;margin-top:6px;}
        .score-bar .fill{height:100%;border-radius:3px;transition:width .6s;}
        .journal-item{display:flex;justify-content:space-between;align-items:center;padding:6px 10px;border-bottom:1px solid #1f2937;font-size:12px;}
        .journal-item .pair{font-weight:600;width:70px;}
        .journal-item .tf{width:50px;color:#6e7681;}
        .journal-item .price{width:80px;font-family:monospace;}
        .journal-item .result{width:60px;font-weight:700;}
        .journal-item .result.win{color:#22c55e;}
        .journal-item .result.loss{color:#ef4444;}
        .journal-item .result.pending{color:#eab308;}
        .equity-chart{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;border:1px solid #1f2937;height:120px;display:flex;align-items:flex-end;gap:2px;overflow:hidden;}
        .equity-bar{flex:1;min-height:2px;border-radius:1px;transition:height 0.3s;}
        .zone-item{border-left:3px solid;padding:6px 10px;margin-bottom:4px;background:rgba(255,255,255,.03);border-radius:4px;display:flex;justify-content:space-between;font-size:12px;}
        .quality-tag{font-size:9px;padding:2px 8px;border-radius:10px;font-weight:700;text-transform:uppercase;}
        .confidence-detail{font-size:11px;color:#8b949e;padding:6px 8px;background:#0a0e17;border-radius:6px;margin-top:4px;line-height:1.6;border-left:3px solid;}
        .details{background:#0a0e17;border-radius:8px;padding:8px;margin-top:6px;}
        .details summary{font-size:11px;color:#58a6ff;cursor:pointer;padding:4px;border-radius:4px;background:#1f293733;}
        .details summary:hover{background:#1f2937;}
        .stat-box{background:#1f2937;border-radius:8px;padding:8px;text-align:center;flex:1;}
        .stat-value{font-size:20px;font-weight:700;}
    </style>
</head>
<body>
<div id="root">
    <div class="loading">⏳ Chargement des données...</div>
</div>

<script>
    // ================================================================
    // BLACKZELDON SCANNER — VERSION VANILLA JS (sans React)
    // Lit data.json, garde 100% du design
    // ================================================================

    const PAIRS = ["XAUUSD", "USDJPY", "USDCAD"];
    const TF_LIST = ["1min", "5min", "15min", "1h", "4h", "1day", "1week"];
    const TF_RADAR = ["1min", "5min", "15min", "1h", "4h", "1day"];
    const KZ = [
        {id:"london", label:"London", start:480, end:600},
        {id:"ny", label:"New York", start:780, end:900},
        {id:"asia", label:"Asie", start:0, end:180}
    ];

    let allData = null;
    let journal = [];
    let stats = null;

    // Journal
    function getJournal() {
        try { return JSON.parse(localStorage.getItem('blackzeldon_journal_v10') || '[]'); }
        catch { return []; }
    }
    function saveJournal(j) { localStorage.setItem('blackzeldon_journal_v10', JSON.stringify(j)); }
    function addTrade(trade) {
        const j = getJournal();
        trade.id = Date.now();
        trade.result = 'pending';
        j.push(trade);
        saveJournal(j);
        journal = j;
        updateStats();
        render();
    }
    function updateTrade(id, result, exitPrice, rMultiple) {
        const j = getJournal();
        const idx = j.findIndex(t => t.id === id);
        if (idx !== -1) {
            j[idx].result = result;
            j[idx].exitPrice = exitPrice;
            j[idx].closedAt = Date.now();
            if (rMultiple !== undefined) j[idx].rMultiple = rMultiple;
            saveJournal(j);
            journal = j;
            updateStats();
            render();
        }
    }
    function updateStats() {
        const closed = journal.filter(t => t.result !== 'pending');
        if (closed.length === 0) { stats = null; return; }
        const wins = closed.filter(t => t.result === 'win').length;
        const losses = closed.length - wins;
        const winrate = wins / closed.length;
        let gain = 0, loss = 0;
        closed.forEach(t => {
            if (t.result === 'win') gain += t.rMultiple || 1;
            else loss += 1;
        });
        const pf = loss > 0 ? gain / loss : gain;
        let equity = 0, peak = 0, maxDD = 0, curve = [];
        closed.forEach(t => {
            const r = t.rMultiple || (t.result === 'win' ? 2 : -1);
            equity += r;
            if (equity > peak) peak = equity;
            const dd = peak > 0 ? (peak - equity) / peak * 100 : 0;
            if (dd > maxDD) maxDD = dd;
            curve.push({ equity, dd });
        });
        stats = { total: closed.length, wins, losses, winrate, pf, maxDD, curve };
    }
    journal = getJournal();
    updateStats();

    // Format time
    function fmtTime(d) {
        try { return d.toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
        catch { return d.toLocaleTimeString(); }
    }

    // LIME (UTC+0)
    function lomeMin(d) {
        try {
            const p = new Intl.DateTimeFormat('fr-FR', { hour: '2-digit', minute: '2-digit', hour12: false, timeZone: 'Africa/Lome' }).formatToParts(d);
            return parseInt(p.find(x => x.type === 'hour').value) * 60 + parseInt(p.find(x => x.type === 'minute').value);
        } catch { return d.getHours() * 60 + d.getMinutes(); }
    }
    function activeKZ(m) {
        return KZ.find(k => m >= k.start && m < k.end) || null;
    }

    // Chargement
    async function loadData() {
        const root = document.getElementById('root');
        root.innerHTML = '<div class="loading">⏳ Chargement...</div>';
        try {
            const resp = await fetch('data.json?t=' + Date.now());
            if (!resp.ok) throw new Error('HTTP ' + resp.status);
            allData = await resp.json();
            render();
        } catch (e) {
            root.innerHTML = '<div class="error">❌ ' + e.message + '<br><br><button class="btn" onclick="loadData()">🔄 Réessayer</button></div>';
        }
    }

    function getTfPrice(pairData, tfId) {
        const candles = pairData?.candles?.[tfId];
        if (!candles || candles.length === 0) return null;
        return candles[candles.length - 1].close;
    }

    function render() {
        if (!allData) return;
        const root = document.getElementById('root');
        const now = new Date();
        const kz = activeKZ(lomeMin(now));
        let html = '';

        // Header
        html += `<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
            <div><div style="font-size:18px;font-weight:800;background:linear-gradient(135deg,#58a6ff,#7c8cff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">⚡ Blackzeldon v10.1 (Pro)</div>
            <div style="font-size:9px;color:#6e7681;margin-top:1px;">💱 Forex · ${kz ? 'KZ: '+kz.label : 'Pas de KZ'}</div></div>
            <div style="font-family:monospace;font-size:14px;color:#58a6ff;">${fmtTime(now)}</div>
        </div>`;

        // Status
        html += `<div class="card" style="border:1px solid #22c55e44;display:flex;justify-content:space-between;align-items:center;">
            <span style="font-size:11px;font-weight:700;color:#22c55e;">✅ Données chargées</span>
            <span style="font-size:10px;color:#6e7681;">${allData.timestamp ? new Date(allData.timestamp).toLocaleTimeString('fr-FR') : ''}</span>
            <button class="btn" style="background:transparent;color:#58a6ff;border:1px solid #1f2937;padding:4px 10px;font-size:11px;width:auto;" onclick="loadData()">🔄</button>
        </div>`;

        // Pair selectors
        html += `<div style="display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap;">`;
        PAIRS.forEach(p => {
            const active = window._selPair === p;
            html += `<button onclick="window._selPair='${p}';render();" style="padding:6px 10px;border-radius:8px;border:${active ? '1px solid #58a6ff' : '1px solid #1f2937'};background:${active ? '#1f2937' : 'transparent'};color:#e6edf3;font-size:12px;font-weight:600;flex:1 1 auto;">${p}</button>`;
        });
        html += `</div>`;
        const selPair = window._selPair || 'XAUUSD';

        // Get pair data
        const pairData = allData.pairs.find(p => p.id === selPair);
        if (!pairData) {
            root.innerHTML = html + '<div class="error">❌ Paire non trouvée</div>';
            return;
        }

        const price = pairData.price || 0;
        const signal = pairData.signal || 'PAS DE TRADE';
        const score = pairData.scoreTotal || 0;
        const quality = pairData.quality || 'FAIBLE';
        const isSignal = signal !== 'PAS DE TRADE' && signal !== null;
        const color = isSignal ? '#22c55e' : '#6e7681';
        const digits = pairData.digits || 2;

        // Timeframe selectors
        html += `<div style="margin-bottom:12px;"><div style="font-size:10px;color:#6e7681;margin-bottom:6px;text-transform:uppercase;letter-spacing:.07em;">Timeframe — config SMC</div>
        <div style="display:flex;gap:5px;flex-wrap:wrap;">`;
        TF_LIST.forEach(tf => {
            const active = window._selTF === tf;
            html += `<button onclick="window._selTF='${tf}';render();" style="flex:1 1 auto;padding:7px 4px;border-radius:8px;border:${active ? '1px solid #e9b94e' : '1px solid #1f2937'};background:${active ? 'rgba(233,185,78,.12)' : 'transparent'};cursor:pointer;text-align:center;min-width:40px;">
                <div style="font-size:13px;font-weight:700;color:${active ? '#e9b94e' : '#e6edf3'};">${tf}</div>
                <div style="font-size:8px;color:#6e7681;margin-top:1px;">${tf === '1min' ? 'scalp' : tf === '5min' ? 'entrée' : tf === '15min' ? 'setup' : tf === '1h' ? 'biais' : tf === '4h' ? 'structure' : tf === '1day' ? 'daily' : 'weekly'}</div>
                <div style="font-size:9px;color:${color};font-weight:700;margin-top:2px;">${score}pts</div>
            </button>`;
        });
        html += `</div></div>`;

        // Top Pick
        let topPick = null;
        let topScore = -1;
        allData.pairs.forEach(p => {
            if (p.signal && p.scoreTotal > topScore) {
                topScore = p.scoreTotal;
                topPick = p;
            }
        });
        if (topPick) {
            const tpColor = '#22c55e';
            html += `<div class="card" style="border:2px solid #eab308;background:rgba(233,185,78,.08);">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                        <span style="font-size:18px;margin-right:8px;">🔥</span>
                        <span style="font-weight:700;font-size:14px;color:#eab308;">Top Pick – M5</span>
                        <div style="font-size:12px;margin-top:4px;">
                            <span style="font-weight:600;">${topPick.symbol || topPick.id}</span>
                            · Score <span style="color:${tpColor};font-weight:700;">${topPick.scoreTotal}</span>
                            · Dir. <span style="color:${tpColor};font-weight:700;">${topPick.signal}</span>
                            · Qualité: <span class="quality-tag" style="background:${tpColor}22;color:${tpColor};">${topPick.quality || 'Excellent'}</span>
                        </div>
                    </div>
                    ${topPick.id !== selPair ? `<button onclick="window._selPair='${topPick.id}';render();" style="background:#eab308;color:#0a0e17;border:none;border-radius:6px;padding:6px 12px;font-weight:700;font-size:11px;cursor:pointer;">Passer</button>` : ''}
                </div>
            </div>`;
        }

        // Radar
        html += `<div class="card"><h3>Radar Multi-TF — ${pairData.symbol || selPair}<span></span></h3>`;
        TF_RADAR.forEach(tf => {
            const tfPrice = getTfPrice(pairData, tf);
            const isBull = signal === 'BUY';
            const col = isSignal ? (isBull ? '#22c55e' : '#ef4444') : '#6e7681';
            const dir = isSignal ? signal : '—';
            const prob = Math.round((pairData.finalProb || 0.5) * 100);
            const sc = pairData.scoreTotal || 0;
            const qlty = pairData.quality || 'FAIBLE';
            const qColor = qlty === 'EXCELLENT' ? '#22c55e' : qlty === 'ATTENDRE' ? '#eab308' : '#6e7681';
            html += `<div style="margin-bottom:6px;cursor:pointer;" onclick="window._selTF='${tf}';render();">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:2px;">
                    <span style="font-size:11px;font-weight:600;color:${tf === window._selTF ? '#e9b94e' : '#e6edf3'};">${tf} (${tf === '1min' ? 'scalp' : tf === '5min' ? 'entrée' : tf === '15min' ? 'setup' : tf === '1h' ? 'biais' : tf === '4h' ? 'structure' : 'daily'})</span>
                    <div style="display:flex;gap:8px;align-items:center;">
                        <span style="font-size:10px;font-weight:700;color:${col};">${dir}</span>
                        <span style="font-size:9px;color:#6e7681;">${prob}%</span>
                        <span class="quality-tag" style="background:${qColor}22;color:${qColor};">${qlty}</span>
                        <span style="font-size:11px;font-weight:700;color:${col};">${sc}pts</span>
                    </div>
                </div>
                <div style="height:4px;background:#1f2937;border-radius:3px;overflow:hidden;">
                    <div style="height:100%;width:${Math.min(100, sc)}%;background:${col};border-radius:3px;transition:width .6s;"></div>
                </div>
            </div>`;
        });
        html += `</div>`;

        // Signal principal
        html += `<div class="card signal-card" style="border-left-color:${color};">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;">
                <div>
                    <div style="font-size:10px;color:#6e7681;margin-bottom:2px;">${pairData.symbol || selPair} · M5 · entrée</div>
                    <div style="font-size:30px;font-weight:700;">${price.toFixed(digits)}</div>
                    <div style="font-size:10px;color:#8b949e;margin-top:4px;">
                        ATR: <span style="color:#e9b94e;font-family:monospace;">${pairData.atr || 0}</span>
                        · RSI: <span style="color:${(pairData.rsi || 50) > 70 ? '#ef4444' : (pairData.rsi || 50) < 30 ? '#22c55e' : '#eab308'};font-weight:600;">${pairData.rsi || 0}</span>
                    </div>
                </div>
                <div style="text-align:right;">
                    <div style="padding:5px 12px;border-radius:20px;font-size:12px;font-weight:700;background:${isSignal ? (signal === 'BUY' ? 'rgba(34,197,94,.15)' : 'rgba(239,68,68,.15)') : '#1f2937'};color:${isSignal ? (signal === 'BUY' ? '#22c55e' : '#ef4444') : '#6e7681'};">
                        ${isSignal ? (signal === 'BUY' ? '▲ HAUSSIER' : '▼ BAISSIER') : '⚠️ PAS DE TRADE'}
                    </div>
                    <div style="font-size:10px;color:#8b949e;margin-top:4px;">
                        Qualité: <span class="quality-tag" style="background:${color}22;color:${color};">${quality}</span>
                        · BOS: <span style="color:${pairData.bos ? '#22c55e' : '#6e7681'};font-weight:600;">${pairData.bos || '—'}</span>
                        · CHoCH: <span style="color:${pairData.choch ? '#eab308' : '#6e7681'};font-weight:600;">${pairData.choch || '—'}</span>
                    </div>
                </div>
            </div>
            <div style="display:flex;gap:8px;margin-top:8px;">
                <span class="badge ${pairData.zone === 'Premium' ? 'badge-red' : 'badge-green'}">${pairData.zone || 'Neutre'}</span>
                <span class="badge ${pairData.dailyBias !== 'Neutre' ? 'badge-yellow' : 'badge-gray'}">D1: ${pairData.dailyBias || 'Neutre'}</span>
                <span class="badge ${pairData.weeklyBias !== 'Neutre' ? 'badge-yellow' : 'badge-gray'}">W1: ${pairData.weeklyBias || 'Neutre'}</span>
            </div>
            ${pairData.confidenceDetails ? `<div class="confidence-detail">🔍 ${pairData.confidenceDetails}</div>` : ''}
        </div>`;

        // Manipulation & Volume
        if (pairData.manipulation) {
            const m = pairData.manipulation;
            html += `<div class="card"><h3>🔍 Manipulation & Volume<span></span></h3>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Fake BOS</div>
                        <div style="font-size:16px;font-weight:700;color:${m.fakeBos ? '#ef4444' : '#22c55e'};">${m.fakeBos ? '⚠️ Oui' : '✅ Non'}</div>
                    </div>
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Inducement</div>
                        <div style="font-size:16px;font-weight:700;color:${m.inducement ? '#eab308' : '#22c55e'};">${m.inducement || 'Aucun'}</div>
                    </div>
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Volume Score</div>
                        <div style="font-size:16px;font-weight:700;color:${(pairData.volumeProfile?.score || 50) > 70 ? '#22c55e' : '#eab308'};">${(pairData.volumeProfile?.score || 50).toFixed(0)}%</div>
                    </div>
                </div>
                ${pairData.volumeProfile ? `<div style="font-size:11px;color:#8b949e;margin-top:6px;text-align:center;">POC: ${pairData.volumeProfile.poc ? pairData.volumeProfile.poc.toFixed(digits) : 'N/A'} · Delta: ${pairData.volumeProfile.delta ? pairData.volumeProfile.delta.toFixed(2) : '0'} · Confiance: ${m.score ? m.score.toFixed(0)+'%' : '—'}</div>` : ''}
            </div>`;
        }

        // Cascade TF
        if (pairData.cascade) {
            const c = pairData.cascade;
            html += `<div class="card"><h3>🌊 Cascade TF & Liquidité<span></span></h3>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Cascade TF</div>
                        <div style="font-size:16px;font-weight:700;color:${c.score > 60 ? '#22c55e' : '#eab308'};">${c.score}%</div>
                    </div>
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Liquidité</div>
                        <div style="font-size:16px;font-weight:700;color:#22c55e;">${pairData.liquidity?.reason || 'N/A'}</div>
                    </div>
                </div>
                ${c.details ? `<div style="font-size:10px;color:#8b949e;margin-top:6px;text-align:center;">${c.details.map(d => d.aligned ? '✅ '+d.label : '❌ '+d.label).join('  ')}</div>` : ''}
            </div>`;
        }

        // Exchange
        if (pairData.exchange) {
            const e = pairData.exchange;
            html += `<div class="card"><h3>🌐 Validation multi-exchanges<span></span></h3>
                <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:6px;">
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Convergence</div>
                        <div style="font-size:16px;font-weight:700;color:${e.score > 60 ? '#22c55e' : '#eab308'};">${e.score.toFixed(0)}%</div>
                    </div>
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Dispersion</div>
                        <div style="font-size:16px;font-weight:700;color:#eab308;">${e.dispersion ? e.dispersion.toFixed(digits) : '—'}</div>
                    </div>
                    <div style="background:#0a0e17;border:1px solid #1f2937;border-radius:8px;padding:8px;text-align:center;">
                        <div style="font-size:9px;color:#6e7681;">Prix moy.</div>

                    return `<div class="equity-bar" style="height:${Math.max(2, h)}%;background:${p.equity >= 0 ? '#22c55e' : '#ef4444'};"></div>`;
                }).join('')}</div>` : ''}
            </div>`;
        }

        // Footer
        html += `<div style="text-align:center;font-size:9px;color:#6e7681;margin-top:16px;line-height:1.8;border-top:1px solid #1f2937;padding-top:12px;">
            BLACKZELDON SCANNER · OSCAR v10.1 (Pro) — Corrigé<br>
            Manipulation · Volume · Cascade TF · Liquidité · Risque dynamique · Multi-Ex · SCS<br>
            Radar / Panel inchangés · ⚠️ vérifie toujours sur MT5 avant d'agir
        </div>`;

        root.innerHTML = html;
    }

    // Chargement initial
    window._selPair = 'XAUUSD';
    window._selTF = 'M5';
    loadData();
    setInterval(loadData, 120000);
</script>
